    <script>
        // ===== 初始化與全域變數 =====
        let appData = [];
        let isPreviewMode = false;
        const stationColumns = ['DF1', 'DF2', 'DF3', 'DF4', 'ET1', 'ET2', 'ET3', 'ET4', 'LT3', 'LT4', 'TF1', 'TF2', 'TF3', 'TF4', 'TF5', 'TF6', 'PTI'];

        const state = { view: 'table', searchTerm: '', statusFilter: 'All', sortConfig: { key: 'regId', direction: 'desc' }, currentPage: 1, itemsPerPage: 30 };

        function mapDBtoFrontend(data) {
            return data.map(row => {
                let flatItem = { ...row };
                stationColumns.forEach(col => flatItem[col.toLowerCase()] = '');
                if (row.stations && row.stations.length > 0) {
                    row.stations.forEach(st => {
                        const colName = st.stationName.toLowerCase();
                        const mp = st.mpValue || '';
                        const url = st.urlLink || '';
                        flatItem[colName] = (mp || url) ? (url ? `${mp}^${url}` : mp) : '';
                    });
                }
                return flatItem;
            });
        }

        function recalculateItemNum() {
            let statusCounters = {};
            appData.forEach((item) => {
                if (!statusCounters[item.status]) statusCounters[item.status] = 0;
                item.itemNum = ++statusCounters[item.status];
            });
        }

        // ===== DB 連線與 API 操作 (透過 C# API) =====
        async function fetchTasks() {
            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') throw new Error('Local preview mode');
                const response = await fetch('/api/tasks');
                if (!response.ok) throw new Error('API 回應異常');
                const data = await response.json();
                appData = mapDBtoFrontend(data);
            } catch (err) {
                if (!isPreviewMode) {
                    console.warn("無法連線至 API，已切換為本地預覽模式。", err);
                    isPreviewMode = true;
                    showToast('預覽模式：已載入測試資料', 'info');

                    const mockDbData = [
                        { regId: 22, date: '2026-04-29', status: '缺欄位', owner: '陳祥', dept: 'PTI', sec: 'ESI', applicant: '林玉婷', desc: 'TF-CUSPUT2-RDR-buffer-A_PM', benefit: 0.6, dbCat: '33', stations: [{ stationName: 'DF1', mpValue: 'V', urlLink: '' }] },
                        { regId: 21, date: '2026-02-10', status: '缺欄位', owner: '-', dept: 'TF5', sec: 'EQ2', applicant: '黃筱嵐', desc: 'CROSS_FAB_INLINE_BENCHMARK_RATATA', benefit: 0, dbCat: '-', stations: [] },
                        { regId: 20, date: '2026-02-03', status: '處理中', owner: '-', dept: 'DM1', sec: 'DM', applicant: '林宗緯', desc: 'DM Gen AI GPT 需求:連接到KLARITY資料', benefit: 0, dbCat: '-', stations: [] },
                        { regId: 19, date: '2026-02-12', status: '處理中', owner: '-', dept: 'DM1', sec: 'DM', applicant: '沈俊龑/林宗緯', desc: 'Hold rate 資訊(PT Hold Report)', benefit: 0, dbCat: '-', stations: [] },
                        { regId: 18, date: '2026-02-12', status: '處理中', owner: '-', dept: 'TF5', sec: 'EQ2', applicant: '黃筱嵐', desc: 'hourly、Weekly HR TGT HOLD_WIP', benefit: 0.035, dbCat: '-', stations: [] },
                        { regId: 17, date: '2026-02-02', status: '已上線', owner: 'ESI:JH', dept: 'TF6', sec: 'PE2', applicant: '詹皓評', desc: 'PDS data 分析', benefit: 0.12, tcd: 'Notes://', dbCat: 'SEMAS', stations: [] }
                    ];
                    let expandedData = [];
                    for (let i = 0; i < 20; i++) {
                        mockDbData.forEach(d => { expandedData.push({ ...d, regId: expandedData.length + 1 }); });
                    }
                    appData = mapDBtoFrontend(expandedData);
                }
            } finally {
                recalculateItemNum();
                renderKPI();
                renderContent();
                renderPagination();
            }
        }

        async function saveData(event) {
            event.preventDefault();
            const mode = document.getElementById('modal-mode').value;
            const today = new Date().toISOString().split('T')[0];

            const payload = {
                date: today,
                status: mode === 'add' ? '缺欄位' : document.getElementById('form-status').value,
                dept: document.getElementById('form-dept').value,
                sec: document.getElementById('form-sec').value,
                applicant: document.getElementById('form-applicant').value,
                desc: document.getElementById('form-desc').value,
                owner: mode === 'add' ? '' : document.getElementById('form-owner').value,
                benefit: mode === 'add' ? 0 : (parseFloat(document.getElementById('form-benefit').value) || 0),
                dbCat: mode === 'add' ? '' : document.getElementById('form-dbcat').value,
                tcd: mode === 'add' ? '' : document.getElementById('form-tcd').value,
                appLink: mode === 'add' ? '' : document.getElementById('form-applink').value,
                dataSource: mode === 'add' ? '' : document.getElementById('form-datasource').value,
                stations: []
            };

            if (mode === 'edit') {
                stationColumns.forEach(col => {
                    const mp = document.getElementById(`st-mp-${col}`).value.trim();
                    const url = document.getElementById(`st-url-${col}`).value.trim();
                    if (mp || url) {
                        payload.stations.push({ stationName: col, mpValue: mp, urlLink: url });
                    }
                });
            }

            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') {
                    throw new Error('Local preview mode');
                }

                if (mode === 'add') {
                    await fetch('/api/tasks', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    state.sortConfig = { key: 'regId', direction: 'desc' };
                    state.currentPage = 1;
                    showToast('需求已成功建立！同步至 DB', 'success');
                } else {
                    const regId = document.getElementById('modal-regid').value;
                    await fetch(`/api/tasks/${regId}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    showToast('資料修改已儲存並同步至 DB！', 'success');
                }
                closeModal('crud-modal');
                await fetchTasks();
            } catch (err) {
                if (mode === 'add') {
                    payload.regId = appData.length > 0 ? Math.max(...appData.map(d => d.regId)) + 1 : 1;
                    appData.push(mapDBtoFrontend([payload])[0]);
                    state.sortConfig = { key: 'regId', direction: 'desc' };
                    state.currentPage = 1;
                    showToast('[預覽] 需求已成功建立！', 'success');
                } else {
                    const regId = parseInt(document.getElementById('modal-regid').value);
                    payload.regId = regId;
                    const idx = appData.findIndex(d => d.regId === regId);
                    if (idx !== -1) appData[idx] = mapDBtoFrontend([payload])[0];
                    showToast('[預覽] 資料修改已儲存！', 'success');
                }
                closeModal('crud-modal');
                recalculateItemNum();
                renderKPI();
                renderContent();
                renderPagination();
            }
        }

        async function deleteData(regId) {
            if (confirm(`確定要刪除 RegID #${regId} 的需求資料嗎？資料庫會一併刪除關聯站點。`)) {
                try {
                    if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') {
                        throw new Error('Local preview mode');
                    }
                    await fetch(`/api/tasks/${regId}`, { method: 'DELETE' });
                    showToast(`已成功刪除項目 #${regId}`, 'info');
                    await fetchTasks();
                } catch (err) {
                    appData = appData.filter(d => d.regId !== regId);
                    showToast(`[預覽] 已成功刪除項目 #${regId}`, 'info');
                    recalculateItemNum();
                    renderKPI();
                    renderContent();
                    renderPagination();
                }
            }

        // ===== 匯入 Excel 邏輯 =====
        async function handleExcelImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!confirm("⚠️ 警告：匯入 Excel 將會【清空目前資料庫所有資料】，並以 Excel 內容重新建立。\n\n確定要繼續嗎？")) {
                event.target.value = ''; return;
            }

            showToast("解析資料中，請稍候...", "info");

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });
                    
                    if (rows.length < 2) throw new Error("Excel 檔案沒有資料列！");

                    const headers = rows[0];
                    const colMap = {};
                    headers.forEach((h, idx) => {
                        if (!h) return;
                        const text = String(h).trim().toLowerCase();
                        if (text.includes('date') || text.includes('日期')) colMap.date = idx;
                        else if (text === 'status' || text.includes('狀態')) colMap.status = idx;
                        else if (text.includes('dept') || text.includes('department')) colMap.dept = idx;
                        else if (text.includes('sec') || text.includes('section')) colMap.sec = idx;
                        else if (text.includes('applicant') || text.includes('申請人')) colMap.applicant = idx;
                        else if (text.includes('desc') || text.includes('摘要')) colMap.desc = idx;
                        else if (text.includes('owner') || text.includes('處理人員')) colMap.owner = idx;
                        else if (text.includes('benefit') || text.includes('效益')) colMap.benefit = idx;
                        else if (text.includes('dbcat')) colMap.dbCat = idx;
                        else if (text.includes('tcd')) colMap.tcd = idx;
                        else if (text.includes('applink') || text.includes('app link')) colMap.appLink = idx;
                        else if (text.includes('datasource') || text.includes('data source')) colMap.dataSource = idx;
                        stationColumns.forEach(st => { if (text === st.toLowerCase()) colMap[st.toLowerCase()] = idx; });
                    });

                    if (colMap.desc === undefined) throw new Error("找不到『需求摘要』欄位，請確認 Excel 格式。");

                    const payloads = [];
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row[colMap.desc]) continue;

                        let stations = [];
                        stationColumns.forEach(st => {
                            let val = row[colMap[st.toLowerCase()]];
                            if (val) {
                                val = String(val).trim();
                                let mp = val, url = '';
                                if (val.includes('^')) { [mp, url] = val.split('^'); } else if (val.startsWith('http') || val.startsWith('Notes://')) { mp = 'Link'; url = val; }
                                stations.push({ stationName: st, mpValue: mp, urlLink: url });
                            }
                        });

                        let dateStr = new Date().toISOString().split('T')[0];
                        const rawDate = row[colMap.date];
                        if (typeof rawDate === 'number') {
                            const d = new Date(Math.round((rawDate - 25569) * 86400 * 1000));
                            dateStr = d.toISOString().split('T')[0];
                        } else if (rawDate) {
                            const d = new Date(rawDate);
                            if (!isNaN(d)) dateStr = d.toISOString().split('T')[0];
                        }

                        payloads.push({
                            date: dateStr, status: row[colMap.status] || '缺欄位', dept: row[colMap.dept] || '',
                            sec: row[colMap.sec] || '', applicant: row[colMap.applicant] || '', desc: row[colMap.desc] || '',
                            owner: row[colMap.owner] || '', benefit: parseFloat(row[colMap.benefit]) || 0,
                            dbCat: row[colMap.dbCat] || '', tcd: row[colMap.tcd] || '', appLink: row[colMap.appLink] || '',
                            dataSource: row[colMap.dataSource] || '', stations: stations
                        });
                    }

                    if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') throw new Error('Local preview mode');

                    const response = await fetch('/api/tasks/import', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payloads) });
                    if (!response.ok) throw new Error("伺服器匯入處理失敗");

                    showToast(`成功匯入 ${payloads.length} 筆資料！`, "success");
                    await fetchTasks();

                } catch (err) {
                    if (isPreviewMode) {
                        appData = mapDBtoFrontend(payloads);
                        appData.forEach((d, idx) => d.regId = idx + 1);
                        showToast(`[預覽] 已模擬匯入 ${payloads.length} 筆資料`, "success");
                        recalculateItemNum(); renderKPI(); renderContent(); renderPagination();
                    } else {
                        console.error(err); showToast("匯入失敗：" + err.message, "error");
                    }
                } finally {
                    event.target.value = '';
                }
            };
            reader.readAsArrayBuffer(file);
        }

        function exportToExcel() {
            const data = getProcessedData();
            if (data.length === 0) return showToast('目前沒有符合條件的資料可以匯出！', 'error');
            const headers = ['註冊日期', 'RegID', 'ITEM_NO', 'STATUS', 'DEPT', 'SECTION', '申請人', '需求摘要', '處理人員', 'TCD', '效益(MP/年)', 'DBCat', 'App LINK', 'Data Source', ...stationColumns];
            const excelData = [headers];
            data.forEach(row => {
                excelData.push([row.date, row.regId, row.itemNum, row.status, row.dept, row.sec, row.applicant, row.desc, row.owner, row.tcd, row.benefit || '', row.dbCat, row.appLink, row.dataSource, ...stationColumns.map(c => row[c.toLowerCase()] || '')]);
            });
            const ws = XLSX.utils.aoa_to_sheet(excelData), wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "任務清單");
            XLSX.writeFile(wb, `代辦中心資料_${new Date().toISOString().slice(0, 10).replace(/-/g, '')}.xlsx`);
            showToast('Excel 報表匯出成功！', 'success');
        }

        // ===== 核心資料過濾與排序函數 =====
        function getProcessedData() {
            let filtered = appData.filter(item => {
                const term = state.searchTerm.toLowerCase();
                const matchesSearch = item.desc.toLowerCase().includes(term) || item.applicant.toLowerCase().includes(term) || item.dept.toLowerCase().includes(term) || (item.sec && item.sec.toLowerCase().includes(term)) || (item.owner && item.owner.toLowerCase().includes(term));
                const matchesStatus = state.statusFilter === 'All' || item.status === state.statusFilter;
                return matchesSearch && matchesStatus;
            });

            filtered.sort((a, b) => {
                let aVal = a[state.sortConfig.key], bVal = b[state.sortConfig.key];
                if (state.sortConfig.key === 'benefit') { aVal = Number(aVal) || 0; bVal = Number(bVal) || 0; }
                if (aVal < bVal) return state.sortConfig.direction === 'asc' ? -1 : 1;
                if (aVal > bVal) return state.sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });
            return filtered;
        }

        // ===== UI 操作與互動函數 =====
        // 深色 UI 的 Toast
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const config = { 
                success: { icon: 'check-circle', color: 'text-monitor-green', bg: 'bg-monitor-green/10', border: 'border-monitor-green/30' }, 
                error: { icon: 'alert-circle', color: 'text-monitor-red', bg: 'bg-monitor-red/10', border: 'border-monitor-red/30' }, 
                info: { icon: 'info', color: 'text-monitor-cyan', bg: 'bg-monitor-cyan/10', border: 'border-monitor-cyan/30' } 
            }[type];
            toast.className = `flex items-center gap-3 px-4 py-3 bg-monitor-card border ${config.border} shadow-2xl rounded-xl pointer-events-auto toast-enter`;
            toast.innerHTML = `<div class="p-1 rounded-full ${config.bg} ${config.color}"><i data-lucide="${config.icon}" class="w-4 h-4"></i></div><p class="text-xs font-bold text-white tracking-wide">${message}</p>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-leave'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        // ★ 深色版：狀態顏色定義
        function getStatusColorClass(status) {
            switch (status) { 
                case '已上線': return 'text-monitor-green border-monitor-green/30 bg-monitor-green/10'; 
                case '處理中': return 'text-monitor-yellow border-monitor-yellow/30 bg-monitor-yellow/10'; 
                case '缺欄位': return 'text-monitor-red border-monitor-red/30 bg-monitor-red/10'; 
                default: return 'text-slate-400 border-slate-600 bg-slate-800'; 
            }
        }
        function getStatusIconTag(status) {
            switch (status) { 
                case '已上線': return '<i data-lucide="check-circle" class="w-3 h-3 mr-1"></i>'; 
                case '處理中': return '<i data-lucide="clock" class="w-3 h-3 mr-1"></i>'; 
                case '缺欄位': return '<i data-lucide="alert-circle" class="w-3 h-3 mr-1"></i>'; 
                default: return ''; 
            }
        }

                        <h3 class="font-bold mb-3 flex-grow line-clamp-2 leading-relaxed text-[13px] text-slate-200" title="${row.desc}">${row.desc}</h3>
                        <div class="mt-auto pt-3 border-t border-monitor-borderLight flex justify-between items-center">
                            <span class="text-[11px] text-slate-400">${row.applicant}</span>
                            <span class="text-[11px] font-mono font-bold text-monitor-green">${row.benefit > 0 ? row.benefit + ' MP' : ''}</span>
                        </div>
                    </div>
                `}).join('');

                if (currentData.length === 0) cardsHtml = `<div class="col-span-full py-16 text-center text-slate-500 font-bold uppercase tracking-widest opacity-60">No Data Found</div>`;
                contentContainer.innerHTML = `<div class="p-5 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">${cardsHtml}</div>`;
            }
            lucide.createIcons();
        }

        function renderPagination() {
            const filtered = getProcessedData();
            const totalItems = filtered.length;
            const isAll = state.itemsPerPage === 'All';
            const totalPages = isAll ? 1 : (Math.ceil(totalItems / state.itemsPerPage) || 1);
            const startNum = totalItems > 0 ? (isAll ? 1 : (state.currentPage - 1) * state.itemsPerPage + 1) : 0;
            const endNum = isAll ? totalItems : Math.min(state.currentPage * state.itemsPerPage, totalItems);
            const prevDisabled = state.currentPage === 1 || isAll || totalItems === 0;
            const nextDisabled = state.currentPage === totalPages || isAll || totalItems === 0;

            document.getElementById('pagination-container').innerHTML = `
            <div class="flex items-center justify-between px-5 py-3">
              <div class="text-[11px] text-monitor-textMuted font-mono">
                Showing <span class="text-white font-bold">${startNum}</span> to <span class="text-white font-bold">${endNum}</span> of <span class="text-white font-bold">${totalItems}</span> entries
              </div>
              <div class="flex items-center gap-4">
                 <div class="flex items-center gap-2">
                   <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Rows:</span>
                   <select onchange="changeItemsPerPage(this.value)" class="text-xs font-mono font-bold px-2 py-1 rounded border border-monitor-borderLight bg-monitor-card text-white cursor-pointer hover:border-monitor-cyan shadow-sm transition-all outline-none">
                      <option value="15" ${state.itemsPerPage === 15 ? 'selected' : ''}>15</option>
                      <option value="30" ${state.itemsPerPage === 30 ? 'selected' : ''}>30</option>
                      <option value="50" ${state.itemsPerPage === 50 ? 'selected' : ''}>50</option>
                      <option value="All" ${state.itemsPerPage === 'All' ? 'selected' : ''}>All</option>
                    </select>
                 </div>
                 <div class="flex items-center gap-1.5">
                   <button onclick="changePage(${Math.max(1, state.currentPage - 1)})" ${prevDisabled ? 'disabled' : ''} class="p-1.5 rounded border transition-colors ${prevDisabled ? 'border-monitor-borderLight text-slate-600 cursor-not-allowed' : 'border-monitor-borderLight text-slate-300 hover:border-monitor-cyan hover:text-white'}">
                     <i data-lucide="chevron-left" class="w-4 h-4"></i>
                   </button>
                   <span class="text-[11px] font-mono px-2 text-white">${state.currentPage} / ${totalPages}</span>
                   <button onclick="changePage(${Math.min(totalPages, state.currentPage + 1)})" ${nextDisabled ? 'disabled' : ''} class="p-1.5 rounded border transition-colors ${nextDisabled ? 'border-monitor-borderLight text-slate-600 cursor-not-allowed' : 'border-monitor-borderLight text-slate-300 hover:border-monitor-cyan hover:text-white'}">
                     <i data-lucide="chevron-right" class="w-4 h-4"></i>
                   </button>
                 </div>
              </div>
            </div>
          `;
          lucide.createIcons();
        }

        function setView(viewMode) {
            state.view = viewMode;
            const btnTable = document.getElementById('btn-view-table');
            const btnCard = document.getElementById('btn-view-card');
            if (viewMode === 'table') {
                btnTable.className = "flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded bg-monitor-panel text-monitor-cyan border border-monitor-borderLight shadow-sm transition-colors";
                btnCard.className = "flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded text-slate-400 hover:text-white transition-colors bg-transparent border border-transparent";
            } else {
                btnCard.className = "flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded bg-monitor-panel text-monitor-cyan border border-monitor-borderLight shadow-sm transition-colors";
                btnTable.className = "flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold rounded text-slate-400 hover:text-white transition-colors bg-transparent border border-transparent";
            }
            renderContent();
        }

        function setSort(key) {
            state.sortConfig.direction = (state.sortConfig.key === key && state.sortConfig.direction === 'desc') ? 'asc' : 'desc';
            state.sortConfig.key = key;
            renderContent();
        }

        function handleSearch(val) { state.searchTerm = val; state.currentPage = 1; renderContent(); renderPagination(); }
        function handleStatusFilter(val) { state.statusFilter = val; state.currentPage = 1; renderContent(); renderPagination(); }
        function changePage(page) { state.currentPage = page; renderContent(); renderPagination(); }

        function changeItemsPerPage(num) {
            state.itemsPerPage = (num === 'All') ? 'All' : Number(num);
            state.currentPage = 1;
            renderContent();
            renderPagination();
        }

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            fetchTasks();
        });
    </script>
</body>
</html>
