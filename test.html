<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代辦中心 (新版 UI + C# DB 連線)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'], mono: ['ui-monospace', 'monospace'], } } }
        }
    </script>

    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

            ::-webkit-scrollbar-thumb:hover {
                background: #94a3b8;
            }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .sticky-left-shadow {
            box-shadow: 4px 0 8px -2px rgba(0, 0, 0, 0.05);
        }

        .sticky-right-shadow {
            box-shadow: -4px 0 8px -2px rgba(0, 0, 0, 0.05);
        }

        .table-row-hover:hover td {
            background-color: #f8fafc; /* 優化為更輕盈的 Hover 顏色 */
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        .toast-enter {
            animation: slideInUp 0.3s ease-out forwards;
        }

        .toast-leave {
            animation: fadeOut 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col antialiased selection:bg-blue-200 selection:text-blue-900">

    <!-- 頂部資訊板 -->
    <div class="bg-white shrink-0 shadow-sm border-b border-slate-200 z-40 relative overflow-hidden">
        <div class="absolute top-0 right-0 w-[600px] h-full bg-gradient-to-l from-blue-50/80 to-transparent pointer-events-none"></div>
        <div class="absolute -top-10 left-[40%] w-[400px] h-[200px] bg-gradient-to-b from-indigo-50/50 to-transparent blur-3xl pointer-events-none"></div>

        <div class="max-w-[1800px] w-full mx-auto px-4 relative">
            <header class="flex items-center justify-between py-3 px-1">
                <div class="flex items-center gap-3.5">
                    <div class="relative flex items-center justify-center w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-700 shadow-md shadow-blue-500/20">
                        <i data-lucide="cpu" class="w-5 h-5 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-extrabold text-slate-900 tracking-tight leading-tight">代辦中心</h1>
                        <p class="text-[11px] text-slate-500 font-medium">GenAI Empowered Task Control</p>
                    </div>
                </div>
                <div class="flex items-center gap-5">
                    <div class="w-8 h-8 flex items-center justify-center rounded-full bg-slate-100 text-slate-600 text-sm font-bold border border-slate-200 hover:bg-slate-200 hover:text-slate-800 transition-colors cursor-pointer shadow-sm">主</div>
                </div>
            </header>

            <div id="kpi-container" class="flex pb-4 overflow-x-auto hide-scrollbar px-1"></div>
        </div>
    </div>

    <!-- 內容區 -->
    <main class="flex-1 px-4 pt-4 pb-12 max-w-[1800px] w-full mx-auto flex flex-col gap-3">

        <!-- 控制列 -->
        <div class="flex flex-wrap items-center justify-between gap-3 p-2 rounded-xl border shrink-0 bg-white border-slate-200 shadow-sm">
            <div class="flex flex-wrap items-center gap-2 sm:gap-3 pl-1.5">
                <div class="flex items-center gap-1.5 mr-1 hidden sm:flex">
                    <i data-lucide="layout-list" class="w-4 h-4 text-blue-600"></i>
                    <h2 class="text-[14px] font-bold text-slate-800 whitespace-nowrap">任務清單</h2>
                </div>

                <div class="relative flex items-center px-2 py-1.5 rounded-md border bg-slate-50 border-slate-200 focus-within:border-blue-400 focus-within:ring-1 focus-within:ring-blue-100 transition-all w-40 sm:w-56">
                    <i data-lucide="search" class="w-3.5 h-3.5 text-slate-400 shrink-0"></i>
                    <input type="text" id="search-input" placeholder="搜尋申請人、需求..." class="ml-1.5 bg-transparent outline-none text-xs w-full text-slate-800 placeholder-slate-400" oninput="handleSearch(this.value)" />
                </div>

                <select id="status-filter" onchange="handleStatusFilter(this.value)" class="text-xs px-2 py-1.5 rounded-md border outline-none cursor-pointer bg-slate-50 border-slate-200 text-slate-700 focus:border-blue-400 transition-all">
                    <option value="All">全部狀態</option>
                    <option value="已上線">已上線</option>
                    <option value="處理中">處理中</option>
                    <option value="缺欄位">缺欄位</option>
                </select>
            </div>

            <div class="flex flex-wrap items-center gap-2 pr-0.5">
                <input type="file" id="excel-upload" accept=".xlsx" class="hidden" onchange="handleExcelImport(event)">
                <button onclick="document.getElementById('excel-upload').click()" class="flex items-center gap-1 px-3 py-1.5 text-[11px] font-semibold rounded-md text-amber-700 bg-amber-50 border border-amber-200 hover:bg-amber-100 transition-all active:scale-95 whitespace-nowrap">
                    <i data-lucide="upload" class="w-3.5 h-3.5"></i> 匯入 Excel
                </button>

                <button onclick="exportToExcel()" class="flex items-center gap-1 px-3 py-1.5 text-[11px] font-semibold rounded-md text-emerald-700 bg-emerald-50 border border-emerald-200 hover:bg-emerald-100 transition-all active:scale-95 whitespace-nowrap">
                    <i data-lucide="download" class="w-3.5 h-3.5"></i> 匯出 Excel
                </button>

                <button onclick="openModal('add')" class="flex items-center gap-1 px-3 py-1.5 text-[11px] font-semibold rounded-md text-white bg-blue-600 hover:bg-blue-700 shadow-sm transition-all active:scale-95 whitespace-nowrap">
                    <i data-lucide="plus" class="w-3.5 h-3.5"></i> 新增需求
                </button>

                <div class="h-4 w-px bg-slate-200 mx-1 hidden sm:block"></div>

                <div class="flex p-0.5 rounded-md border bg-slate-100 border-slate-200 shrink-0">
                    <button id="btn-view-table" onclick="setView('table')" class="flex items-center gap-1.5 px-3 py-1 text-xs font-medium rounded transition-colors bg-white text-slate-800 shadow-sm">
                        <i data-lucide="list" class="w-3.5 h-3.5"></i> 總覽
                    </button>
                    <button id="btn-view-card" onclick="setView('card')" class="flex items-center gap-1.5 px-3 py-1 text-xs font-medium rounded transition-colors text-slate-500 hover:text-slate-700">
                        <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i> 卡片
                    </button>
                </div>
            </div>
        </div>

        <!-- 表格容器 -->
        <div id="content-container" class="w-full relative"></div>

        <!-- 分頁列 -->
        <div id="pagination-container" class="mt-2 shrink-0"></div>

    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[120] flex flex-col gap-3 pointer-events-none"></div>

    <!-- CRUD Modal -->
    <div id="crud-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeModal('crud-modal')"></div>
        <div id="crud-modal-content" class="relative bg-white rounded-xl shadow-2xl w-full max-w-4xl flex flex-col transform transition-all scale-95 opacity-0 duration-200 border border-slate-200 max-h-[90vh]">
            <div class="flex justify-between items-center p-5 border-b border-slate-100 shrink-0">
                <h3 id="modal-title" class="text-lg font-bold text-slate-800 flex items-center gap-2"></h3>
                <button type="button" onclick="closeModal('crud-modal')" class="p-1.5 rounded-lg text-slate-400 hover:text-slate-600 hover:bg-slate-100 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-5 overflow-y-auto custom-scrollbar">
                <form id="crud-form" onsubmit="saveData(event)" class="space-y-6">
                    <input type="hidden" id="modal-mode" value="add">
                    <input type="hidden" id="modal-regid" value="">

                    <div>
                        <h4 class="text-sm font-bold text-slate-800 border-b border-slate-200 pb-2 mb-4">基礎資訊</h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <div class="relative"><label class="block text-sm font-semibold text-slate-600 mb-1.5">DEPT <span class="text-rose-500">*</span></label><input type="text" id="form-dept" required class="w-full px-4 py-2 border rounded-xl outline-none bg-slate-50 border-slate-200 text-slate-900 disabled:bg-slate-100/50 disabled:text-slate-500 disabled:cursor-not-allowed"></div>
                            <div class="relative"><label class="block text-sm font-semibold text-slate-600 mb-1.5">SECTION <span class="text-rose-500">*</span></label><input type="text" id="form-sec" required class="w-full px-4 py-2 border rounded-xl outline-none bg-slate-50 border-slate-200 text-slate-900 disabled:bg-slate-100/50 disabled:text-slate-500 disabled:cursor-not-allowed"></div>
                            <div class="relative"><label class="block text-sm font-semibold text-slate-600 mb-1.5">申請人 <span class="text-rose-500">*</span></label><input type="text" id="form-applicant" required class="w-full px-4 py-2 border rounded-xl outline-none bg-slate-50 border-slate-200 text-slate-900 disabled:bg-slate-100/50 disabled:text-slate-500 disabled:cursor-not-allowed"></div>
                        </div>
                        <div class="relative"><label class="block text-sm font-semibold text-slate-600 mb-1.5">需求摘要 <span class="text-rose-500">*</span></label><textarea id="form-desc" required rows="2" class="w-full px-4 py-2 border rounded-xl outline-none bg-slate-50 border-slate-200 text-slate-900 disabled:bg-slate-100/50 disabled:text-slate-500 disabled:cursor-not-allowed resize-none"></textarea></div>
                    </div>

                    <div id="edit-advanced-section" class="hidden space-y-6">
                        <div>
                            <h4 class="text-sm font-bold text-slate-800 border-b border-slate-200 pb-2 mb-4">執行與追蹤</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div><label class="block text-sm font-semibold text-slate-600 mb-1.5">STATUS</label><select id="form-status" class="w-full px-4 py-2 border rounded-xl outline-none bg-white border-slate-200 text-slate-900"><option value="缺欄位">缺欄位</option><option value="處理中">處理中</option><option value="已上線">已上線</option></select></div>
                                <div><label class="block text-sm font-semibold text-slate-600 mb-1.5">處理人員</label><input type="text" id="form-owner" class="w-full px-4 py-2 border rounded-xl outline-none bg-white border-slate-200 text-slate-900"></div>
                                <div><label class="block text-sm font-semibold text-slate-600 mb-1.5">效益(MP/年)</label><input type="number" step="0.0001" id="form-benefit" class="w-full px-4 py-2 border rounded-xl outline-none bg-white border-slate-200 text-slate-900"></div>
                                <div><label class="block text-sm font-semibold text-slate-600 mb-1.5">DBCat</label><input type="text" id="form-dbcat" class="w-full px-4 py-2 border rounded-xl outline-none bg-white border-slate-200 text-slate-900"></div>
                                <div><label class="block text-sm font-semibold text-slate-600 mb-1.5">TCD</label><input type="text" id="form-tcd" class="w-full px-4 py-2 border rounded-xl outline-none bg-white border-slate-200 text-slate-900"></div>
                                <div><label class="block text-sm font-semibold text-slate-600 mb-1.5">App LINK</label><input type="text" id="form-applink" class="w-full px-4 py-2 border rounded-xl outline-none bg-white border-slate-200 text-slate-900"></div>
                            </div>
                        </div>
                        <div>
                            <h4 class="text-sm font-bold text-slate-800 border-b border-slate-200 pb-2 mb-4">Data Source</h4>
                            <textarea id="form-datasource" rows="3" class="w-full px-4 py-3 border rounded-xl outline-none bg-slate-50 border-slate-200 text-slate-900 font-mono text-[13px]"></textarea>
                        </div>
                        <div>
                            <h4 class="text-sm font-bold text-slate-800 border-b border-slate-200 pb-2 mb-4">機台站點設定</h4>
                            <div id="form-stations-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>
                        </div>
                    </div>

                    <div class="pt-4 flex gap-3 justify-end border-t border-slate-100">
                        <button type="button" onclick="closeModal('crud-modal')" class="px-5 py-2 text-sm font-semibold rounded-lg border text-slate-600 bg-white hover:bg-slate-50 border-slate-200">取消</button>
                        <button type="submit" class="px-5 py-2 text-sm font-semibold rounded-lg text-white bg-blue-600 hover:bg-blue-700 shadow-sm">儲存變更</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SQL Viewer Modal -->
    <div id="sql-modal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="closeModal('sql-modal')"></div>
        <div id="sql-modal-content" class="relative bg-slate-900 rounded-xl shadow-2xl w-full max-w-3xl transform transition-all scale-95 opacity-0 duration-200 border border-slate-700 overflow-hidden">
            <div class="flex justify-between items-center px-5 py-4 border-b border-slate-800 bg-slate-800/50">
                <h3 class="text-sm font-bold text-slate-200 flex items-center gap-2">
                    <i data-lucide="code" class="w-4 h-4 text-emerald-400"></i> Data Source
                </h3>
                <button onclick="closeModal('sql-modal')" class="p-1 text-slate-400 hover:text-white transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-5 overflow-x-auto max-h-[70vh]">
                <pre><code id="sql-viewer-code" class="text-sm font-mono text-emerald-400 whitespace-pre-wrap break-all"></code></pre>
            </div>
        </div>
    </div>

    <script>
        // ===== 初始化與全域變數 =====
        let appData = [];
        let isPreviewMode = false;
        const stationColumns = ['DF1', 'DF2', 'DF3', 'DF4', 'ET1', 'ET2', 'ET3', 'ET4', 'LT3', 'LT4', 'TF1', 'TF2', 'TF3', 'TF4', 'TF5', 'TF6', 'PTI'];

        const state = { view: 'table', searchTerm: '', statusFilter: 'All', sortConfig: { key: 'regId', direction: 'desc' }, currentPage: 1, itemsPerPage: 30 };

        function mapDBtoFrontend(data) {
            return data.map(row => {
                let flatItem = { ...row };
                stationColumns.forEach(col => flatItem[col.toLowerCase()] = '');
                if (row.stations && row.stations.length > 0) {
                    row.stations.forEach(st => {
                        const colName = st.stationName.toLowerCase();
                        const mp = st.mpValue || '';
                        const url = st.urlLink || '';
                        flatItem[colName] = (mp || url) ? (url ? `${mp}^${url}` : mp) : '';
                    });
                }
                return flatItem;
            });
        }

        function recalculateItemNum() {
            let statusCounters = {};
            appData.forEach((item) => {
                if (!statusCounters[item.status]) statusCounters[item.status] = 0;
                item.itemNum = ++statusCounters[item.status];
            });
        }

        // ===== DB 連線與 API 操作 (透過 C# API) =====
        async function fetchTasks() {
            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') throw new Error('Local preview mode');
                const response = await fetch('/api/tasks');
                if (!response.ok) throw new Error('API 回應異常');
                const data = await response.json();
                appData = mapDBtoFrontend(data);
            } catch (err) {
                if (!isPreviewMode) {
                    console.warn("無法連線至 API，已切換為本地預覽模式。", err);
                    isPreviewMode = true;
                    showToast('預覽模式：無法連線 C# 伺服器，已載入測試資料', 'info');

                    const mockDbData = [
                        { regId: 22, date: '2026-04-29', status: '缺欄位', owner: '陳祥', dept: 'PTI', sec: 'ESI', applicant: '林玉婷', desc: 'TEST', benefit: 0.6, dbCat: '33', stations: [{ stationName: 'DF1', mpValue: 'V', urlLink: '' }] },
                        { regId: 21, date: '2026-02-10', status: '缺欄位', owner: '-', dept: 'TF5', sec: 'EQ2', applicant: '黃筱嵐', desc: 'CROSS_FAB_INLINE_BENCHMARK_RATATA', benefit: 0, dbCat: '-', stations: [] },
                        { regId: 20, date: '2026-02-03', status: '處理中', owner: '-', dept: 'DM1', sec: 'DM', applicant: '林宗緯', desc: 'DM Gen AI GPT 需求:連接到KLARITY資料', benefit: 0, dbCat: '-', stations: [] },
                        { regId: 19, date: '2026-02-12', status: '處理中', owner: '-', dept: 'DM1', sec: 'DM', applicant: '沈俊龑/林宗緯', desc: 'Hold rate 資訊(PT Hold Report)', benefit: 0, dbCat: '-', stations: [] }
                    ];
                    // 自動擴增資料以便測試無高度限制的捲軸
                    let expandedData = [];
                    for (let i = 0; i < 20; i++) {
                        mockDbData.forEach(d => { expandedData.push({ ...d, regId: expandedData.length + 1 }); });
                    }
                    appData = mapDBtoFrontend(expandedData);
                }
            } finally {
                recalculateItemNum();
                renderKPI();
                renderContent();
                renderPagination();
            }
        }

        async function saveData(event) {
            event.preventDefault();
            const mode = document.getElementById('modal-mode').value;
            const today = new Date().toISOString().split('T')[0];

            const payload = {
                date: today,
                status: mode === 'add' ? '缺欄位' : document.getElementById('form-status').value,
                dept: document.getElementById('form-dept').value,
                sec: document.getElementById('form-sec').value,
                applicant: document.getElementById('form-applicant').value,
                desc: document.getElementById('form-desc').value,
                owner: mode === 'add' ? '' : document.getElementById('form-owner').value,
                benefit: mode === 'add' ? 0 : (parseFloat(document.getElementById('form-benefit').value) || 0),
                dbCat: mode === 'add' ? '' : document.getElementById('form-dbcat').value,
                tcd: mode === 'add' ? '' : document.getElementById('form-tcd').value,
                appLink: mode === 'add' ? '' : document.getElementById('form-applink').value,
                dataSource: mode === 'add' ? '' : document.getElementById('form-datasource').value,
                stations: []
            };

            if (mode === 'edit') {
                stationColumns.forEach(col => {
                    const mp = document.getElementById(`st-mp-${col}`).value.trim();
                    const url = document.getElementById(`st-url-${col}`).value.trim();
                    if (mp || url) {
                        payload.stations.push({ stationName: col, mpValue: mp, urlLink: url });
                    }
                });
            }

            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') {
                    throw new Error('Local preview mode');
                }

                if (mode === 'add') {
                    await fetch('/api/tasks', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    state.sortConfig = { key: 'regId', direction: 'desc' };
                    state.currentPage = 1;
                    showToast('需求已成功建立！同步至 DB', 'success');
                } else {
                    const regId = document.getElementById('modal-regid').value;
                    await fetch(`/api/tasks/${regId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    showToast('資料修改已儲存並同步至 DB！', 'success');
                }
                closeModal('crud-modal');
                await fetchTasks();
            } catch (err) {
                if (mode === 'add') {
                    payload.regId = appData.length > 0 ? Math.max(...appData.map(d => d.regId)) + 1 : 1;
                    appData.push(mapDBtoFrontend([payload])[0]);
                    state.sortConfig = { key: 'regId', direction: 'desc' };
                    state.currentPage = 1;
                    showToast('[預覽] 需求已成功建立！', 'success');
                } else {
                    const regId = parseInt(document.getElementById('modal-regid').value);
                    payload.regId = regId;
                    const idx = appData.findIndex(d => d.regId === regId);
                    if (idx !== -1) appData[idx] = mapDBtoFrontend([payload])[0];
                    showToast('[預覽] 資料修改已儲存！', 'success');
                }
                closeModal('crud-modal');
                recalculateItemNum();
                renderKPI();
                renderContent();
                renderPagination();
            }
        }

        async function deleteData(regId) {
            if (confirm(`確定要刪除 RegID #${regId} 的需求資料嗎？資料庫會一併刪除關聯站點。`)) {
                try {
                    if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') {
                        throw new Error('Local preview mode');
                    }
                    await fetch(`/api/tasks/${regId}`, { method: 'DELETE' });
                    showToast(`已成功刪除項目 #${regId}`, 'info');
                    await fetchTasks();
                } catch (err) {
                    appData = appData.filter(d => d.regId !== regId);
                    showToast(`[預覽] 已成功刪除項目 #${regId}`, 'info');
                    recalculateItemNum();
                    renderKPI();
                    renderContent();
                    renderPagination();
                }
            }
        }

        // ===== 匯入 Excel 邏輯 =====
        async function handleExcelImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!confirm("⚠️ 警告：匯入 Excel 將會【清空目前資料庫所有資料】，並以 Excel 內容重新建立。\n\n確定要繼續嗎？")) {
                event.target.value = '';
                return;
            }

            showToast("解析資料中，請稍候...", "info");

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];

                    const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });
                    if (rows.length < 2) throw new Error("Excel 檔案沒有資料列！");

                    const headers = rows[0];
                    const colMap = {};
                    headers.forEach((h, idx) => {
                        if (!h) return;
                        const text = String(h).trim().toLowerCase();
                        if (text.includes('date') || text.includes('日期')) colMap.date = idx;
                        else if (text === 'status' || text.includes('狀態')) colMap.status = idx;
                        else if (text.includes('dept') || text.includes('department')) colMap.dept = idx;
                        else if (text.includes('sec') || text.includes('section')) colMap.sec = idx;
                        else if (text.includes('applicant') || text.includes('申請人')) colMap.applicant = idx;
                        else if (text.includes('desc') || text.includes('摘要')) colMap.desc = idx;
                        else if (text.includes('owner') || text.includes('處理人員')) colMap.owner = idx;
                        else if (text.includes('benefit') || text.includes('效益')) colMap.benefit = idx;
                        else if (text.includes('dbcat')) colMap.dbCat = idx;
                        else if (text.includes('tcd')) colMap.tcd = idx;
                        else if (text.includes('applink') || text.includes('app link')) colMap.appLink = idx;
                        else if (text.includes('datasource') || text.includes('data source')) colMap.dataSource = idx;

                        stationColumns.forEach(st => {
                            if (text === st.toLowerCase()) colMap[st.toLowerCase()] = idx;
                        });
                    });

                    if (colMap.desc === undefined) throw new Error("找不到『需求摘要』欄位，請確認 Excel 格式。");

                    const payloads = [];
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row[colMap.desc]) continue;

                        let stations = [];
                        stationColumns.forEach(st => {
                            let val = row[colMap[st.toLowerCase()]];
                            if (val) {
                                val = String(val).trim();
                                let mp = val, url = '';
                                if (val.includes('^')) { [mp, url] = val.split('^'); }
                                else if (val.startsWith('http') || val.startsWith('Notes://')) { mp = 'Link'; url = val; }
                                stations.push({ stationName: st, mpValue: mp, urlLink: url });
                            }
                        });

                        let dateStr = new Date().toISOString().split('T')[0];
                        const rawDate = row[colMap.date];
                        if (typeof rawDate === 'number') {
                            const d = new Date(Math.round((rawDate - 25569) * 86400 * 1000));
                            dateStr = d.toISOString().split('T')[0];
                        } else if (rawDate) {
                            const d = new Date(rawDate);
                            if (!isNaN(d)) dateStr = d.toISOString().split('T')[0];
                        }

                        payloads.push({
                            date: dateStr, status: row[colMap.status] || '缺欄位', dept: row[colMap.dept] || '',
                            sec: row[colMap.sec] || '', applicant: row[colMap.applicant] || '', desc: row[colMap.desc] || '',
                            owner: row[colMap.owner] || '', benefit: parseFloat(row[colMap.benefit]) || 0,
                            dbCat: row[colMap.dbCat] || '', tcd: row[colMap.tcd] || '', appLink: row[colMap.appLink] || '',
                            dataSource: row[colMap.dataSource] || '', stations: stations
                        });
                    }

                    if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') {
                        throw new Error('Local preview mode');
                    }

                    const response = await fetch('/api/tasks/import', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payloads)
                    });

                    if (!response.ok) throw new Error("伺服器匯入處理失敗");

                    showToast(`成功匯入 ${payloads.length} 筆資料！`, "success");
                    await fetchTasks();

                } catch (err) {
                    if (isPreviewMode) {
                        appData = mapDBtoFrontend(payloads);
                        appData.forEach((d, idx) => d.regId = idx + 1);
                        showToast(`[預覽] 已模擬匯入 ${payloads.length} 筆資料`, "success");
                        recalculateItemNum(); renderKPI(); renderContent(); renderPagination();
                    } else {
                        console.error(err);
                        showToast("匯入失敗：" + err.message, "error");
                    }
                } finally {
                    event.target.value = '';
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // ===== UI 操作與互動函數 =====
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const config = { success: { icon: 'check-circle-2', color: 'text-emerald-500', bg: 'bg-emerald-50', border: 'border-emerald-200' }, error: { icon: 'alert-circle', color: 'text-rose-500', bg: 'bg-rose-50', border: 'border-rose-200' }, info: { icon: 'info', color: 'text-blue-500', bg: 'bg-blue-50', border: 'border-blue-200' } }[type];
            toast.className = `flex items-center gap-3 px-4 py-3 bg-white border ${config.border} shadow-lg rounded-xl pointer-events-auto toast-enter`;
            toast.innerHTML = `<div class="p-1 rounded-full ${config.bg} ${config.color}"><i data-lucide="${config.icon}" class="w-5 h-5"></i></div><p class="text-sm font-semibold text-slate-700">${message}</p>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-leave'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function getStatusColorClass(status) {
            switch (status) { case '已上線': return 'bg-emerald-50 text-emerald-600 border-emerald-100/50'; case '處理中': return 'bg-amber-50 text-amber-600 border-amber-100/50'; case '缺欄位': return 'bg-rose-50 text-rose-600 border-rose-100/50'; default: return 'bg-slate-50 text-slate-600 border-slate-200/50'; }
        }
        function getStatusIconTag(status) {
            switch (status) { case '已上線': return '<i data-lucide="check-circle" class="w-3.5 h-3.5 mr-1 text-emerald-500"></i>'; case '處理中': return '<i data-lucide="clock" class="w-3.5 h-3.5 mr-1 text-amber-500"></i>'; case '缺欄位': return '<i data-lucide="alert-octagon" class="w-3.5 h-3.5 mr-1 text-rose-500"></i>'; default: return ''; }
        }
        function formatIconLink(val, type) {
            if (!val) return `<span class="text-slate-400 font-medium">-</span>`;
            let href = val.startsWith('http') || val.startsWith('Notes') ? val : 'http://' + val;
            let iconName = type === 'tcd' ? 'file-text' : 'external-link';
            return `<a href="${href}" target="_blank" title="開啟連結: ${val}" class="inline-flex items-center justify-center p-1.5 rounded-md text-blue-600 bg-blue-50 border border-blue-200 hover:bg-blue-100 hover:text-blue-700 transition-colors" onclick="event.stopPropagation()"><i data-lucide="${iconName}" class="w-4 h-4"></i></a>`;
        }

            const modal = document.getElementById('crud-modal');

            document.getElementById('crud-form').reset();

                document.getElementById('modal-title').innerHTML = '<i data-lucide="plus-circle" class="w-5 h-5 text-blue-600"></i> 新增需求';
                document.getElementById('edit-advanced-section').classList.add('hidden');
                baseInputs.forEach(id => document.getElementById(id).disabled = false);
            } else if (mode === 'edit') {
                document.getElementById('modal-title').innerHTML = `<i data-lucide="edit-3" class="w-5 h-5 text-blue-600"></i> 編輯需求 <span class="ml-2 text-sm font-normal text-slate-500">#RegID: ${regId}</span>`;
                document.getElementById('edit-advanced-section').classList.remove('hidden');
                document.getElementById('modal-regid').value = regId;
                baseInputs.forEach(id => document.getElementById(id).disabled = true);

                const item = appData.find(d => d.regId === regId);
                if (item) {

                    document.getElementById('form-applicant').value = item.applicant; document.getElementById('form-desc').value = item.desc;
                    document.getElementById('form-status').value = item.status; document.getElementById('form-owner').value = item.owner || '';
                    document.getElementById('form-benefit').value = item.benefit || ''; document.getElementById('form-dbcat').value = item.dbCat || '';
                    document.getElementById('form-tcd').value = item.tcd || ''; document.getElementById('form-applink').value = item.appLink || '';
                    document.getElementById('form-datasource').value = item.dataSource || '';

                    document.getElementById('form-stations-grid').innerHTML = stationColumns.map(col => {
                        let val = item[col.toLowerCase()] || '', mp = '', url = '';
                        if (val.includes('^')) { [mp, url] = val.split('^'); } else if (val.startsWith('http') || val.startsWith('Notes://')) { url = val; } else { mp = val; }
                        return `<div class="p-2.5 border rounded-lg bg-slate-50 relative focus-within:border-blue-400 focus-within:bg-white"><label class="absolute -top-2 left-2 px-1 text-xs font-bold bg-slate-50 text-slate-500">${col}</label><div class="space-y-1.5 mt-1"><div class="flex items-center bg-white border rounded overflow-hidden"><span class="pl-2 text-slate-400"><i data-lucide="activity" class="w-3 h-3"></i></span><input type="text" id="st-mp-${col}" value="${mp}" placeholder="MP Saving" class="w-full text-xs font-medium px-2 py-1 bg-transparent outline-none"></div><div class="flex items-center bg-white border rounded overflow-hidden"><span class="pl-2 text-slate-400"><i data-lucide="link" class="w-3 h-3"></i></span><input type="text" id="st-url-${col}" value="${url}" placeholder="URL" class="w-full text-xs font-medium px-2 py-1 bg-transparent outline-none"></div></div></div>`;
                    }).join('');
                }
            }
            modal.classList.remove('hidden'); lucide.createIcons();
            setTimeout(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); }, 10);
        }

            const item = appData.find(d => d.regId === regId);
            if (!item || !item.dataSource) return;

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(modalId + '-content');
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');

        function exportToExcel() {
            const data = getProcessedData();
            if (data.length === 0) return showToast('目前沒有符合條件的資料可以匯出！', 'error');
            const headers = ['註冊日期', 'RegID', 'ITEM_NO', 'STATUS', 'DEPT', 'SECTION', '申請人', '需求摘要', '處理人員', 'TCD', '效益(MP/年)', 'DBCat', 'App LINK', 'Data Source', ...stationColumns];
            const excelData = [headers];
            data.forEach(row => {
                excelData.push([row.date, row.regId, row.itemNum, row.status, row.dept, row.sec, row.applicant, row.desc, row.owner, row.tcd, row.benefit || '', row.dbCat, row.appLink, row.dataSource, ...stationColumns.map(c => row[c.toLowerCase()] || '')]);
            });
            const ws = XLSX.utils.aoa_to_sheet(excelData), wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "任務清單");
            XLSX.writeFile(wb, `代辦中心資料_${new Date().toISOString().slice(0, 10).replace(/-/g, '')}.xlsx`);
            showToast('Excel 報表匯出成功！', 'success');
        }

        // ===== 渲染功能 =====
        function getProcessedData() {
            let filtered = appData.filter(item => {
                const term = state.searchTerm.toLowerCase();
                const matchesSearch = item.desc.toLowerCase().includes(term) || item.applicant.toLowerCase().includes(term) || item.dept.toLowerCase().includes(term) || (item.sec && item.sec.toLowerCase().includes(term)) || (item.owner && item.owner.toLowerCase().includes(term));
                const matchesStatus = state.statusFilter === 'All' || item.status === state.statusFilter;
                return matchesSearch && matchesStatus;
            });

            filtered.sort((a, b) => {
                let aVal = a[state.sortConfig.key], bVal = b[state.sortConfig.key];
                if (state.sortConfig.key === 'benefit') { aVal = Number(aVal) || 0; bVal = Number(bVal) || 0; }
                if (aVal < bVal) return state.sortConfig.direction === 'asc' ? -1 : 1;
                if (aVal > bVal) return state.sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });
            return filtered;
        }

        // ★ 核心修復：優化排序小箭頭 (還原截圖的淡藍雙箭頭)
        function renderSortHeader(label, sortKey, className) {
            const isActive = state.sortConfig.key === sortKey;
            const isAsc = isActive && state.sortConfig.direction === 'asc';
            const isDesc = isActive && state.sortConfig.direction === 'desc';

            let upColor = isAsc ? 'text-blue-600' : 'text-slate-300 group-hover:text-blue-400';
            let downColor = isDesc ? 'text-blue-600' : 'text-slate-300 group-hover:text-blue-400';

            return `
                <th class="px-3 py-3 cursor-pointer select-none group transition-colors hover:bg-slate-50 bg-[#f8fafc] border-b border-slate-200/60 ${className}" onclick="setSort('${sortKey}')">

                    ${label}
                    <div class="flex items-center -space-x-[3px] transition-opacity">
                        <i data-lucide="arrow-up" class="w-[11px] h-[11px] ${upColor} transition-colors" stroke-width="3"></i>
                        <i data-lucide="arrow-down" class="w-[11px] h-[11px] ${downColor} transition-colors" stroke-width="3"></i>
                    </div>
                  </div>
                </th>

                          ${renderSortHeader('ITEM_NO', 'itemNum', 'text-center sticky left-[150px] z-30 border-r border-slate-200/60 bg-[#f8fafc] sticky-left-shadow')}
                          ${renderSortHeader('STATUS', 'status', 'border-b border-slate-200/60')}
                          ${renderSortHeader('DEPT', 'dept', 'border-b border-slate-200/60 min-w-[70px] max-w-[120px]')}
                          ${renderSortHeader('SECTION', 'sec', 'border-b border-slate-200/60 min-w-[70px] max-w-[120px]')}
                          ${renderSortHeader('申請人', 'applicant', 'border-b border-slate-200/60 min-w-[80px] max-w-[150px]')}
                          ${renderSortHeader('需求摘要', 'desc', 'border-b border-slate-200/60 min-w-[350px] max-w-[500px]')}
                          ${renderSortHeader('負責人', 'owner', 'border-b border-slate-200/60 min-w-[90px] max-w-[150px]')}
                          <th class="px-3 py-3 border-b border-slate-200/60 text-center font-semibold text-[11px] tracking-widest uppercase text-slate-500 min-w-[50px]">TCD</th>
                          ${renderSortHeader('效益', 'benefit', 'border-b border-slate-200/60 text-right min-w-[80px]')}
                          <th class="px-3 py-3 border-b border-slate-200/60 font-semibold text-[11px] tracking-widest uppercase text-slate-500 min-w-[80px] max-w-[150px] text-center">DBCat</th>
                          <th class="px-3 py-3 border-b border-slate-200/60 text-center font-semibold text-[11px] tracking-widest uppercase text-slate-500 min-w-[50px]">App LINK</th>
                          <th class="px-3 py-3 border-b border-slate-200/60 text-center font-semibold text-[11px] tracking-widest uppercase text-slate-500 min-w-[50px]">SQL</th>
                          ${stationHeaders}
                          <th class="px-2 py-3 sticky right-0 z-30 border-b border-slate-200/60 bg-[#f8fafc] text-center font-semibold text-[11px] text-slate-500 tracking-widest uppercase sticky-right-shadow">操作</th>
                        </tr>
                      </thead>
                      <tbody class="divide-y divide-slate-50">${rowsHtml}</tbody>
                    </table>
                  </div>
                `;
            } else {
                let cardsHtml = currentData.map(row => `
                  <div class="flex flex-col p-5 rounded-xl border transition-all hover:shadow-md bg-white border-slate-200 hover:border-blue-300 relative group">

                    <div class="absolute top-3 right-3 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                      <button onclick="openModal('edit', ${row.regId})" class="p-1.5 rounded-md bg-white border border-slate-200 text-blue-600 hover:bg-blue-50 shadow-sm">
                        <i data-lucide="edit-3" class="w-3.5 h-3.5"></i>
                      </button>
                      <button onclick="deleteData(${row.regId})" class="p-1.5 rounded-md bg-white border border-slate-200 text-rose-600 hover:bg-rose-50 shadow-sm">
                        <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                      </button>
                    </div>

                    <div class="flex justify-between items-start mb-3 mr-16">
                      <div class="flex items-center gap-2">
                        <span class="inline-flex items-center px-2.5 py-1 rounded-[6px] text-[11px] font-bold border ${getStatusColorClass(row.status)}">
                          ${getStatusIconTag(row.status)}
                          ${row.status}
                        </span>
                        <span class="text-xs font-bold px-2 py-1 rounded bg-slate-100 text-slate-600" title="同狀態下的優先級順序">
                          ITEMNO: ${row.itemNum}
                        </span>
                      </div>
                    </div>

                    <div class="flex justify-between items-end mb-1">
                      <div class="text-xs font-semibold text-emerald-600">申請人: ${row.applicant}</div>
                      <div class="text-right">
                        <div class="text-xs font-bold text-blue-600">#${row.regId}</div>
                        <div class="text-[10px] font-medium text-slate-500">${row.date}</div>
                      </div>
                    </div>

                    <h3 class="font-semibold mb-3 flex-grow line-clamp-2 leading-relaxed text-sm text-slate-800" title="${row.desc}">
                      ${row.desc}
                    </h3>

                    <div class="mt-auto pt-4 border-t space-y-2 border-slate-100">
                      <div class="flex justify-between items-center text-sm">
                        <span class="text-slate-500">負責人</span>
                        <span class="font-medium text-slate-700">${row.owner || '未指派'}</span>
                      </div>
                      <div class="flex justify-between items-center text-sm">
                        <span class="text-slate-500">部門/課別</span>
                        <span class="font-medium text-slate-700">${row.dept} / ${row.sec || '-'}</span>
                      </div>
                      <div class="flex justify-between items-center text-sm mt-2 pt-2 border-t border-slate-50">
                        <span class="font-medium text-slate-600">預期效益</span>
                        <span class="font-bold ${row.benefit > 0 ? 'text-emerald-500' : 'text-slate-400'}">
                          ${row.benefit > 0 ? `${row.benefit} MP/年` : '無'}
                        </span>
                      </div>
                    </div>
                  </div>
                `).join('');

                if (currentData.length === 0) {
                    cardsHtml = `<div class="col-span-full py-16 text-center text-slate-500">找不到符合條件的資料。</div>`;
                }

                contentContainer.innerHTML = `
                  <div class="w-full pb-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                      ${cardsHtml}
                    </div>
                  </div>
                `;
            }
            lucide.createIcons();
        }

        function renderPagination() {
            const filtered = getProcessedData();
            const totalItems = filtered.length;

            const isAll = state.itemsPerPage === 'All';
            const totalPages = isAll ? 1 : (Math.ceil(totalItems / state.itemsPerPage) || 1);

            const startNum = totalItems > 0 ? (isAll ? 1 : (state.currentPage - 1) * state.itemsPerPage + 1) : 0;
            const endNum = isAll ? totalItems : Math.min(state.currentPage * state.itemsPerPage, totalItems);

            const prevDisabled = state.currentPage === 1 || isAll || totalItems === 0;
            const nextDisabled = state.currentPage === totalPages || isAll || totalItems === 0;

            document.getElementById('pagination-container').innerHTML = `
                <div class="flex items-center justify-between px-5 py-3.5 rounded-xl border bg-white border-slate-200 shadow-sm mt-1">
                  <div class="text-[12px] text-slate-500 font-medium">
                    顯示 <span class="font-bold text-slate-800">${startNum}</span> - <span class="font-bold text-slate-800">${endNum}</span> 筆，共 <span class="font-bold text-slate-800">${totalItems}</span> 筆
                  </div>
                  <div class="flex items-center gap-4">
                     <div class="flex items-center gap-1.5">
                       <span class="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Rows:</span>
                       <select onchange="changeItemsPerPage(this.value)" class="text-xs font-bold px-2 py-1.5 rounded-lg border outline-none bg-slate-50 border-slate-200 text-slate-700 cursor-pointer hover:border-slate-300 shadow-sm transition-colors">
                          <option value="15" ${state.itemsPerPage === 15 ? 'selected' : ''}>15</option>
                          <option value="30" ${state.itemsPerPage === 30 ? 'selected' : ''}>30</option>
                          <option value="50" ${state.itemsPerPage === 50 ? 'selected' : ''}>50</option>
                          <option value="All" ${state.itemsPerPage === 'All' ? 'selected' : ''}>All</option>
                        </select>
                     </div>
                     <div class="flex items-center gap-1.5">
                       <button onclick="changePage(${Math.max(1, state.currentPage - 1)})" ${prevDisabled ? 'disabled' : ''} class="p-1.5 rounded-lg border transition-colors ${prevDisabled ? 'border-slate-100 text-slate-300 cursor-not-allowed' : 'border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-800 shadow-sm'}">
                         <i data-lucide="chevron-left" class="w-4 h-4"></i>
                       </button>
                       <span class="text-[12px] px-2 text-slate-600 font-bold tracking-widest">${state.currentPage} / ${totalPages}</span>
                       <button onclick="changePage(${Math.min(totalPages, state.currentPage + 1)})" ${nextDisabled ? 'disabled' : ''} class="p-1.5 rounded-lg border transition-colors ${nextDisabled ? 'border-slate-100 text-slate-300 cursor-not-allowed' : 'border-slate-200 text-slate-500 hover:bg-slate-50 hover:text-slate-800 shadow-sm'}">
                         <i data-lucide="chevron-right" class="w-4 h-4"></i>
                       </button>
                     </div>
                  </div>
                </div>
              `;
        }

        function setView(viewMode) {
            state.view = viewMode;
            const btnTable = document.getElementById('btn-view-table');
            const btnCard = document.getElementById('btn-view-card');
            if (viewMode === 'table') {
                btnTable.className = "flex items-center gap-1.5 px-3 py-1 text-xs font-bold rounded-[6px] transition-colors bg-white text-blue-600 shadow-sm border border-slate-200";
                btnCard.className = "flex items-center gap-1.5 px-3 py-1 text-xs font-bold rounded-[6px] transition-colors text-slate-500 hover:text-slate-800 bg-transparent border border-transparent";
            } else {
                btnCard.className = "flex items-center gap-1.5 px-3 py-1 text-xs font-bold rounded-[6px] transition-colors bg-white text-blue-600 shadow-sm border border-slate-200";
                btnTable.className = "flex items-center gap-1.5 px-3 py-1 text-xs font-bold rounded-[6px] transition-colors text-slate-500 hover:text-slate-800 bg-transparent border border-transparent";
            }
            renderContent();
        }

        function setSort(key) {
            state.sortConfig.direction = (state.sortConfig.key === key && state.sortConfig.direction === 'desc') ? 'asc' : 'desc';
            state.sortConfig.key = key;
            renderContent();
        }

        function handleSearch(val) { state.searchTerm = val; state.currentPage = 1; renderContent(); renderPagination(); }
        function handleStatusFilter(val) { state.statusFilter = val; state.currentPage = 1; renderContent(); renderPagination(); }
        function changePage(page) { state.currentPage = page; renderContent(); renderPagination(); }

        function changeItemsPerPage(num) {
            state.itemsPerPage = (num === 'All') ? 'All' : Number(num);
            state.currentPage = 1;
            renderContent();
            renderPagination();
        }

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            fetchTasks();
        });
    </script>
</body>
</html>
