<!DOCTYPE html>
<html lang="zh-TW" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>代辦中心 (高階深海藍優化版)</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'], mono: ['ui-monospace', 'monospace'] },
                    colors: {
                        navyslate: {
                            800: '#1e293b',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 6px;
            border: 2px solid #f8fafc;
        }

            ::-webkit-scrollbar-thumb:hover {
                background: #94a3b8;
            }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .sticky-left-shadow {
            box-shadow: 4px 0 10px -2px rgba(0, 0, 0, 0.04);
        }

        .sticky-right-shadow {
            box-shadow: -4px 0 10px -2px rgba(0, 0, 0, 0.04);
        }

        .table-row-hover:hover td {
            background-color: #f8fafc;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
            }

            to {
                opacity: 0;
            }
        }

        .toast-enter {
            animation: slideInUp 0.3s ease-out forwards;
        }

        .toast-leave {
            animation: fadeOut 0.3s ease-out forwards;
        }
    </style>
</head>
<body class="bg-[#f4f7fb] text-slate-800 font-sans min-h-screen flex flex-col antialiased selection:bg-blue-100 selection:text-blue-900">

    <!-- ★ 頂部：深海藍 (Navy Slate) 漸層區塊 -->
    <div class="bg-gradient-to-r from-navyslate-900 to-navyslate-800 shrink-0 z-0 relative pb-20">
        <div class="max-w-[1800px] w-full mx-auto px-4 sm:px-6 relative">
            <header class="flex items-center justify-between py-5">
                <div class="flex items-center gap-3.5">
                    <div class="w-10 h-10 flex items-center justify-center rounded-xl bg-blue-500 shadow-lg border border-blue-400/30">
                        <i data-lucide="cpu" class="w-5 h-5 text-white"></i>
                    </div>
                    <div class="flex flex-col">
                        <h1 class="text-xl font-bold text-white tracking-tight leading-none mb-1">代辦中心</h1>
                        <p class="text-[11px] font-medium text-slate-400 tracking-wider">GenAI Empowered Task Control</p>
                    </div>
                </div>
                <div class="flex items-center gap-4">
                    <div class="w-9 h-9 rounded-full bg-white/10 border border-white/20 flex items-center justify-center text-white text-sm font-bold shadow-sm hover:bg-white/20 transition-colors cursor-pointer backdrop-blur-sm">主</div>
                </div>
            </header>
        </div>
    </div>

    <!-- 內容區 -->
    <main class="flex-1 w-full max-w-[1800px] mx-auto px-4 sm:px-6 -mt-14 pb-12 flex flex-col gap-5 relative z-10">

        <!-- KPI 卡片容器 -->
        <div id="kpi-container" class="flex flex-row gap-4 overflow-x-auto hide-scrollbar shrink-0">
            <!-- 由 JS 動態渲染 -->
        </div>

        <div class="bg-white rounded-2xl shadow-[0_4px_20px_-4px_rgba(0,0,0,0.05)] border border-slate-200/60 flex flex-col flex-1 overflow-hidden mt-1 transition-all">

            <!-- 控制列 -->
            <div class="px-5 py-4 border-b border-slate-100 flex flex-wrap items-center justify-between gap-4 bg-white z-20">
                <div class="flex items-center gap-3">
                    <div class="flex items-center gap-2 mr-2 hidden sm:flex">
                        <i data-lucide="layout-list" class="w-4 h-4 text-blue-500"></i>
                        <h2 class="text-[14px] font-bold text-slate-800 whitespace-nowrap tracking-tight">任務清單</h2>
                    </div>

                    <div class="relative group">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3 top-1/2 -translate-y-1/2 group-focus-within:text-blue-500 transition-colors"></i>
                        <input type="text" id="search-input" placeholder="搜尋關鍵字..." class="pl-9 pr-4 py-1.5 bg-slate-50 border border-slate-200 focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 rounded-lg text-[13px] text-slate-800 placeholder-slate-400 outline-none transition-all w-56 focus:w-72 font-medium" oninput="handleSearch(this.value)" />
                    </div>

                    <div class="relative">
                        <select id="status-filter" onchange="handleStatusFilter(this.value)" class="text-[13px] px-3 py-1.5 bg-slate-50 border border-slate-200 focus:bg-white focus:border-blue-400 focus:ring-2 focus:ring-blue-100 rounded-lg text-slate-600 outline-none transition-all cursor-pointer font-medium appearance-none pr-8">
                            <option value="All">全部狀態</option>
                            <option value="已上線">已上線</option>
                            <option value="處理中">處理中</option>
                            <option value="缺欄位">缺欄位</option>
                        </select>
                        <i data-lucide="chevron-down" class="w-4 h-4 text-slate-400 absolute right-2.5 top-1/2 -translate-y-1/2 pointer-events-none"></i>
                    </div>
                </div>

                <div class="flex items-center gap-2.5">
                    <input type="file" id="excel-upload" accept=".xlsx" class="hidden" onchange="handleExcelImport(event)">
                    <button onclick="document.getElementById('excel-upload').click()" class="flex items-center gap-1.5 px-4 py-1.5 text-[12px] font-bold rounded-lg text-amber-600 bg-amber-50 hover:bg-amber-100 transition-colors border border-amber-200/50 active:scale-95">
                        <i data-lucide="upload" class="w-3.5 h-3.5"></i> 匯入
                    </button>
                    <button onclick="exportToExcel()" class="flex items-center gap-1.5 px-4 py-1.5 text-[12px] font-bold rounded-lg text-emerald-600 bg-emerald-50 hover:bg-emerald-100 transition-colors border border-emerald-200/50 active:scale-95">
                        <i data-lucide="download" class="w-3.5 h-3.5"></i> 匯出
                    </button>

                    <button onclick="openModal('add')" class="flex items-center gap-1.5 px-5 py-1.5 text-[12px] font-bold rounded-lg text-white bg-blue-600 hover:bg-blue-700 shadow-md shadow-blue-500/20 transition-all active:scale-95 ml-1">
                        <i data-lucide="plus" class="w-3.5 h-3.5"></i> 新增需求
                    </button>

                    <div class="h-5 w-px bg-slate-200 mx-2 hidden sm:block"></div>

                    <div class="flex p-0.5 rounded-lg bg-slate-100 border border-slate-200 shrink-0">
                        <button id="btn-view-table" onclick="setView('table')" class="flex items-center gap-1.5 px-3 py-1 text-xs font-bold rounded-[6px] transition-all bg-white text-slate-800 shadow-sm border border-slate-200/50">
                            <i data-lucide="list" class="w-3.5 h-3.5"></i>
                        </button>
                        <button id="btn-view-card" onclick="setView('card')" class="flex items-center gap-1.5 px-3 py-1 text-xs font-bold rounded-[6px] transition-all text-slate-500 hover:text-slate-800">
                            <i data-lucide="layout-dashboard" class="w-3.5 h-3.5"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 表格容器 -->
            <div id="content-container" class="w-full relative bg-white"></div>

            <!-- 分頁列 -->
            <div id="pagination-container" class="border-t border-slate-100 bg-slate-50/50 rounded-b-2xl"></div>

        </div>
    </main>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[120] flex flex-col gap-3 pointer-events-none"></div>

    <!-- CRUD Modal -->
    <div id="crud-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 sm:p-6">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm transition-opacity" onclick="closeModal('crud-modal')"></div>
        <div id="crud-modal-content" class="relative bg-white rounded-2xl shadow-2xl w-full max-w-4xl flex flex-col transform transition-all scale-95 opacity-0 duration-200 border border-slate-200 max-h-[90vh] overflow-hidden">
            <div class="flex justify-between items-center p-5 border-b border-slate-100 shrink-0 bg-slate-50/50">
                <h3 id="modal-title" class="text-lg font-bold text-slate-800 flex items-center gap-2"></h3>
                <button type="button" onclick="closeModal('crud-modal')" class="p-2 rounded-full text-slate-400 hover:text-slate-600 hover:bg-slate-200 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 overflow-y-auto custom-scrollbar">
                <form id="crud-form" onsubmit="saveData(event)" class="space-y-6">
                    <input type="hidden" id="modal-mode" value="add">
                    <input type="hidden" id="modal-regid" value="">

                    <div>
                        <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">基礎資訊</h4>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                            <div class="relative"><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase">DEPT <span class="text-rose-500">*</span></label><input type="text" id="form-dept" required class="w-full px-4 py-2 border rounded-xl outline-none bg-slate-50 border-slate-200 focus:bg-white focus:border-blue-400 transition-all text-slate-900 disabled:opacity-60"></div>
                            <div class="relative"><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase">SECTION <span class="text-rose-500">*</span></label><input type="text" id="form-sec" required class="w-full px-4 py-2 border rounded-xl outline-none bg-slate-50 border-slate-200 focus:bg-white focus:border-blue-400 transition-all text-slate-900 disabled:opacity-60"></div>
                            <div class="relative"><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase">申請人 <span class="text-rose-500">*</span></label><input type="text" id="form-applicant" required class="w-full px-4 py-2 border rounded-xl outline-none bg-slate-50 border-slate-200 focus:bg-white focus:border-blue-400 transition-all text-slate-900 disabled:opacity-60"></div>
                        </div>
                        <div class="relative"><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase">需求摘要 <span class="text-rose-500">*</span></label><textarea id="form-desc" required rows="2" class="w-full px-4 py-2 border rounded-xl outline-none bg-slate-50 border-slate-200 focus:bg-white focus:border-blue-400 transition-all text-slate-900 disabled:opacity-60 resize-none"></textarea></div>
                    </div>

                    <div id="edit-advanced-section" class="hidden space-y-6">
                        <div>
                            <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">執行與追蹤</h4>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div><label class="block text-xs font-bold text-slate-500 mb-1.5">STATUS</label><select id="form-status" class="w-full px-4 py-2 border rounded-xl outline-none bg-white border-slate-200 text-slate-900"><option value="缺欄位">缺欄位</option><option value="處理中">處理中</option><option value="已上線">已上線</option></select></div>
                                <div><label class="block text-xs font-bold text-slate-500 mb-1.5">處理人員</label><input type="text" id="form-owner" class="w-full px-4 py-2 border rounded-xl outline-none bg-white border-slate-200 text-slate-900"></div>
                                <div><label class="block text-xs font-bold text-slate-500 mb-1.5">效益(MP/年)</label><input type="number" step="0.0001" id="form-benefit" class="w-full px-4 py-2 border rounded-xl outline-none bg-white border-slate-200 text-slate-900"></div>
                                <div><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase">DBCat</label><input type="text" id="form-dbcat" class="w-full px-4 py-2 border rounded-xl outline-none bg-white border-slate-200 text-slate-900"></div>
                                <div><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase">TCD</label><input type="text" id="form-tcd" class="w-full px-4 py-2 border rounded-xl outline-none bg-white border-slate-200 text-slate-900"></div>
                                <div><label class="block text-xs font-bold text-slate-500 mb-1.5 uppercase">App LINK</label><input type="text" id="form-applink" class="w-full px-4 py-2 border rounded-xl outline-none bg-white border-slate-200 text-slate-900"></div>
                            </div>
                        </div>
                        <div>
                            <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4 uppercase">Data Source</h4>
                            <textarea id="form-datasource" rows="3" class="w-full px-4 py-3 border rounded-xl outline-none bg-slate-900 border-slate-700 text-emerald-400 font-mono text-[13px] shadow-inner"></textarea>
                        </div>
                        <div>
                            <h4 class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-4">機台站點設定</h4>
                            <div id="form-stations-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3"></div>
                        </div>
                    </div>

                    <div class="pt-6 flex gap-3 justify-end border-t border-slate-100">
                        <button type="button" onclick="closeModal('crud-modal')" class="px-6 py-2 text-sm font-bold rounded-xl border text-slate-500 bg-white hover:bg-slate-50 border-slate-200 transition-colors">取消</button>
                        <button type="submit" class="px-8 py-2 text-sm font-bold rounded-xl text-white bg-blue-600 hover:bg-blue-700 shadow-md transition-all active:scale-95">儲存變更</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- SQL Viewer Modal -->
    <div id="sql-modal" class="hidden fixed inset-0 z-[110] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm transition-opacity" onclick="closeModal('sql-modal')"></div>
        <div id="sql-modal-content" class="relative bg-slate-900 rounded-2xl shadow-2xl w-full max-w-3xl transform transition-all scale-95 opacity-0 duration-200 border border-slate-700 overflow-hidden">
            <div class="flex justify-between items-center px-6 py-4 border-b border-slate-800 bg-slate-800/50">
                <h3 class="text-sm font-bold text-slate-200 flex items-center gap-2">
                    <i data-lucide="code" class="w-4 h-4 text-emerald-400"></i> Data Source
                </h3>
                <button onclick="closeModal('sql-modal')" class="p-2 rounded-full text-slate-400 hover:text-white hover:bg-slate-800 transition-colors">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div class="p-6 overflow-x-auto max-h-[70vh]">
                <pre><code id="sql-viewer-code" class="text-[13px] font-mono text-emerald-400 whitespace-pre-wrap break-all leading-relaxed"></code></pre>
            </div>
        </div>
    </div>

    <script>
        // ===== 初始化與全域變數 =====
        let appData = [];
        let isPreviewMode = false;
        const stationColumns = ['DF1', 'DF2', 'DF3', 'DF4', 'ET1', 'ET2', 'ET3', 'ET4', 'LT3', 'LT4', 'TF1', 'TF2', 'TF3', 'TF4', 'TF5', 'TF6', 'PTI'];

        const state = { view: 'table', searchTerm: '', statusFilter: 'All', sortConfig: { key: 'regId', direction: 'desc' }, currentPage: 1, itemsPerPage: 30 };

        function mapDBtoFrontend(data) {
            return data.map(row => {
                let flatItem = { ...row };
                stationColumns.forEach(col => flatItem[col.toLowerCase()] = '');
                if (row.stations && row.stations.length > 0) {
                    row.stations.forEach(st => {
                        const colName = st.stationName.toLowerCase();
                        const mp = st.mpValue || '';
                        const url = st.urlLink || '';
                        flatItem[colName] = (mp || url) ? (url ? `${mp}^${url}` : mp) : '';
                    });
                }
                return flatItem;
            });
        }

        function recalculateItemNum() {
            let statusCounters = {};
            appData.forEach((item) => {
                if (!statusCounters[item.status]) statusCounters[item.status] = 0;
                item.itemNum = ++statusCounters[item.status];
            });
        }

        // ===== DB 連線與 API 操作 =====
        async function fetchTasks() {
            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') throw new Error('Local preview mode');
                const response = await fetch('/api/tasks');
                if (!response.ok) throw new Error('API 回應異常');
                const data = await response.json();
                appData = mapDBtoFrontend(data);
            } catch (err) {
                if (!isPreviewMode) {
                    console.warn("無法連線至 API，已切換為本地預覽模式。", err);
                    isPreviewMode = true;
                    showToast('預覽模式：無法連線 C# 伺服器，已載入測試資料', 'info');

                    const mockDbData = [
                        { regId: 22, date: '2026-04-29', status: '缺欄位', owner: '陳祥', dept: 'PTI', sec: 'ESI', applicant: '林玉婷', desc: 'TEST', benefit: 0.6, dbCat: '33', stations: [{ stationName: 'DF1', mpValue: 'V', urlLink: '' }] },
                        { regId: 21, date: '2026-02-10', status: '缺欄位', owner: '-', dept: 'TF5', sec: 'EQ2', applicant: '黃筱嵐', desc: 'CROSS_FAB_INLINE_BENCHMARK_RATATA', benefit: 0, dbCat: '-', stations: [] },
                        { regId: 20, date: '2026-02-03', status: '處理中', owner: '-', dept: 'DM1', sec: 'DM', applicant: '林宗緯', desc: 'DM Gen AI GPT 需求:連接到KLARITY資料', benefit: 0, dbCat: '-', stations: [] },
                        { regId: 19, date: '2026-02-12', status: '處理中', owner: '-', dept: 'DM1', sec: 'DM', applicant: '沈俊龑/林宗緯', desc: 'Hold rate 資訊(PT Hold Report)', benefit: 0, dbCat: '-', stations: [] }
                    ];
                    let expandedData = [];
                    for (let i = 0; i < 20; i++) {
                        mockDbData.forEach(d => { expandedData.push({ ...d, regId: expandedData.length + 1 }); });
                    }
                    appData = mapDBtoFrontend(expandedData);
                }
            } finally {
                recalculateItemNum();
                renderKPI();
                renderContent();
                renderPagination();
            }
        }

        async function saveData(event) {
            event.preventDefault();
            const mode = document.getElementById('modal-mode').value;
            const today = new Date().toISOString().split('T')[0];

            const payload = {
                date: today,
                status: mode === 'add' ? '缺欄位' : document.getElementById('form-status').value,
                dept: document.getElementById('form-dept').value,
                sec: document.getElementById('form-sec').value,
                applicant: document.getElementById('form-applicant').value,
                desc: document.getElementById('form-desc').value,
                owner: mode === 'add' ? '' : document.getElementById('form-owner').value,
                benefit: mode === 'add' ? 0 : (parseFloat(document.getElementById('form-benefit').value) || 0),
                dbCat: mode === 'add' ? '' : document.getElementById('form-dbcat').value,
                tcd: mode === 'add' ? '' : document.getElementById('form-tcd').value,
                appLink: mode === 'add' ? '' : document.getElementById('form-applink').value,
                dataSource: mode === 'add' ? '' : document.getElementById('form-datasource').value,
                stations: []
            };

            if (mode === 'edit') {
                stationColumns.forEach(col => {
                    const mp = document.getElementById(`st-mp-${col}`).value.trim();
                    const url = document.getElementById(`st-url-${col}`).value.trim();
                    if (mp || url) {
                        payload.stations.push({ stationName: col, mpValue: mp, urlLink: url });
                    }
                });
            }

            try {
                if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') {
                    throw new Error('Local preview mode');
                }

                if (mode === 'add') {
                    await fetch('/api/tasks', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    state.sortConfig = { key: 'regId', direction: 'desc' };
                    state.currentPage = 1;
                    showToast('需求已成功建立！同步至 DB', 'success');
                } else {
                    const regId = document.getElementById('modal-regid').value;
                    await fetch(`/api/tasks/${regId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    showToast('資料修改已儲存並同步至 DB！', 'success');
                }
                closeModal('crud-modal');
                await fetchTasks();
            } catch (err) {
                if (mode === 'add') {
                    payload.regId = appData.length > 0 ? Math.max(...appData.map(d => d.regId)) + 1 : 1;
                    appData.push(mapDBtoFrontend([payload])[0]);
                    state.sortConfig = { key: 'regId', direction: 'desc' };
                    state.currentPage = 1;
                    showToast('[預覽] 需求已成功建立！', 'success');
                } else {
                    const regId = parseInt(document.getElementById('modal-regid').value);
                    payload.regId = regId;
                    const idx = appData.findIndex(d => d.regId === regId);
                    if (idx !== -1) appData[idx] = mapDBtoFrontend([payload])[0];
                    showToast('[預覽] 資料修改已儲存！', 'success');
                }
                closeModal('crud-modal');
                recalculateItemNum();
                renderKPI();
                renderContent();
                renderPagination();
            }
        }

        async function deleteData(regId) {
            if (confirm(`確定要刪除 RegID #${regId} 的需求資料嗎？`)) {
                try {
                    if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') {
                        throw new Error('Local preview mode');
                    }
                    await fetch(`/api/tasks/${regId}`, { method: 'DELETE' });
                    showToast(`已成功刪除項目 #${regId}`, 'info');
                    await fetchTasks();
                } catch (err) {
                    appData = appData.filter(d => d.regId !== regId);
                    showToast(`[預覽] 已成功刪除項目 #${regId}`, 'info');
                    recalculateItemNum();
                    renderKPI();
                    renderContent();
                    renderPagination();
                }
            }
        }

        // ===== 匯入 Excel 邏輯 =====
        async function handleExcelImport(event) {
            const file = event.target.files[0];
            if (!file) return;

            if (!confirm("⚠️ 警告：匯入 Excel 將會【清空目前資料庫所有資料】，並以 Excel 內容重新建立。\n\n確定要繼續嗎？")) {
                event.target.value = '';
                return;
            }

            showToast("解析資料中，請稍候...", "info");

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];
                    const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: '' });

                    if (rows.length < 2) throw new Error("Excel 檔案沒有資料列！");

                    const headers = rows[0];
                    const colMap = {};
                    headers.forEach((h, idx) => {
                        if (!h) return;
                        const text = String(h).trim().toLowerCase();
                        if (text.includes('date') || text.includes('日期')) colMap.date = idx;
                        else if (text === 'status' || text.includes('狀態')) colMap.status = idx;
                        else if (text.includes('dept') || text.includes('department')) colMap.dept = idx;
                        else if (text.includes('sec') || text.includes('section')) colMap.sec = idx;
                        else if (text.includes('applicant') || text.includes('申請人')) colMap.applicant = idx;
                        else if (text.includes('desc') || text.includes('摘要')) colMap.desc = idx;
                        else if (text.includes('owner') || text.includes('處理人員')) colMap.owner = idx;
                        else if (text.includes('benefit') || text.includes('效益')) colMap.benefit = idx;
                        else if (text.includes('dbcat')) colMap.dbCat = idx;
                        else if (text.includes('tcd')) colMap.tcd = idx;
                        else if (text.includes('applink') || text.includes('app link')) colMap.appLink = idx;
                        else if (text.includes('datasource') || text.includes('data source')) colMap.dataSource = idx;

                        stationColumns.forEach(st => {
                            if (text === st.toLowerCase()) colMap[st.toLowerCase()] = idx;
                        });
                    });

                    if (colMap.desc === undefined) throw new Error("找不到『需求摘要』欄位，請確認 Excel 格式。");

                    const payloads = [];
                    for (let i = 1; i < rows.length; i++) {
                        const row = rows[i];
                        if (!row[colMap.desc]) continue;

                        let stations = [];
                        stationColumns.forEach(st => {
                            let val = row[colMap[st.toLowerCase()]];
                            if (val) {
                                val = String(val).trim();
                                let mp = val, url = '';
                                if (val.includes('^')) { [mp, url] = val.split('^'); }
                                else if (val.startsWith('http') || val.startsWith('Notes://')) { mp = 'Link'; url = val; }
                                stations.push({ stationName: st, mpValue: mp, urlLink: url });
                            }
                        });

                        let dateStr = new Date().toISOString().split('T')[0];
                        const rawDate = row[colMap.date];
                        if (typeof rawDate === 'number') {
                            const d = new Date(Math.round((rawDate - 25569) * 86400 * 1000));
                            dateStr = d.toISOString().split('T')[0];
                        } else if (rawDate) {
                            const d = new Date(rawDate);
                            if (!isNaN(d)) dateStr = d.toISOString().split('T')[0];
                        }

                        payloads.push({
                            date: dateStr, status: row[colMap.status] || '缺欄位', dept: row[colMap.dept] || '',
                            sec: row[colMap.sec] || '', applicant: row[colMap.applicant] || '', desc: row[colMap.desc] || '',
                            owner: row[colMap.owner] || '', benefit: parseFloat(row[colMap.benefit]) || 0,
                            dbCat: row[colMap.dbCat] || '', tcd: row[colMap.tcd] || '', appLink: row[colMap.appLink] || '',
                            dataSource: row[colMap.dataSource] || '', stations: stations
                        });
                    }

                    if (window.location.protocol === 'blob:' || window.location.protocol === 'file:') {
                        throw new Error('Local preview mode');
                    }

                    const response = await fetch('/api/tasks/import', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payloads)
                    });

                    if (!response.ok) throw new Error("伺服器匯入處理失敗");

                    showToast(`成功匯入 ${payloads.length} 筆資料！`, "success");
                    await fetchTasks();

                } catch (err) {
                    if (isPreviewMode) {
                        appData = mapDBtoFrontend(payloads);
                        appData.forEach((d, idx) => d.regId = idx + 1);
                        showToast(`[預覽] 已模擬匯入 ${payloads.length} 筆資料`, "success");
                        recalculateItemNum(); renderKPI(); renderContent(); renderPagination();
                    } else {
                        console.error(err);
                        showToast("匯入失敗：" + err.message, "error");
                    }
                } finally {
                    event.target.value = '';
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // ===== 核心資料過濾與排序函數 =====
        function getProcessedData() {
            let filtered = appData.filter(item => {
                const term = state.searchTerm.toLowerCase();
                const matchesSearch = item.desc.toLowerCase().includes(term) ||
                                     item.applicant.toLowerCase().includes(term) ||
                                     item.dept.toLowerCase().includes(term) ||
                                     (item.sec && item.sec.toLowerCase().includes(term)) ||
                                     (item.owner && item.owner.toLowerCase().includes(term));
                const matchesStatus = state.statusFilter === 'All' || item.status === state.statusFilter;
                return matchesSearch && matchesStatus;
            });

            filtered.sort((a, b) => {
                let aVal = a[state.sortConfig.key], bVal = b[state.sortConfig.key];
                if (state.sortConfig.key === 'benefit') { aVal = Number(aVal) || 0; bVal = Number(bVal) || 0; }
                if (aVal < bVal) return state.sortConfig.direction === 'asc' ? -1 : 1;
                if (aVal > bVal) return state.sortConfig.direction === 'asc' ? 1 : -1;
                return 0;
            });
            return filtered;
        }

        // ===== UI 操作與互動函數 =====
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const config = { success: { icon: 'check-circle-2', color: 'text-emerald-500', bg: 'bg-emerald-50', border: 'border-emerald-200' }, error: { icon: 'alert-circle', color: 'text-rose-500', bg: 'bg-rose-50', border: 'border-rose-200' }, info: { icon: 'info', color: 'text-blue-500', bg: 'bg-blue-50', border: 'border-blue-200' } }[type];
            toast.className = `flex items-center gap-3 px-4 py-3 bg-white border ${config.border} shadow-lg rounded-xl pointer-events-auto toast-enter`;
            toast.innerHTML = `<div class="p-1 rounded-full ${config.bg} ${config.color}"><i data-lucide="${config.icon}" class="w-5 h-5"></i></div><p class="text-sm font-semibold text-slate-700">${message}</p>`;
            container.appendChild(toast);
            lucide.createIcons();
            setTimeout(() => { toast.classList.replace('toast-enter', 'toast-leave'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function getStatusTag(status) {
            if (status === '已上線') return `<span class="inline-flex items-center gap-1.5 px-2 py-1 rounded-[6px] text-[11px] font-bold bg-emerald-50 text-emerald-600 border border-emerald-100/50 whitespace-nowrap"><i data-lucide="check-circle" class="w-3.5 h-3.5"></i>${status}</span>`;
            if (status === '處理中') return `<span class="inline-flex items-center gap-1.5 px-2 py-1 rounded-[6px] text-[11px] font-bold bg-amber-50 text-amber-600 border border-amber-100/50 whitespace-nowrap"><i data-lucide="clock" class="w-3.5 h-3.5"></i>${status}</span>`;
            return `<span class="inline-flex items-center gap-1.5 px-2 py-1 rounded-[6px] text-[11px] font-bold bg-rose-50 text-rose-600 border border-rose-100/50 whitespace-nowrap"><i data-lucide="alert-octagon" class="w-3.5 h-3.5"></i>${status}</span>`;
        }

        function getStatusIconTag(status) {
            switch (status) { case '已上線': return '<i data-lucide="check-circle" class="w-3.5 h-3.5 mr-1 text-emerald-500"></i>'; case '處理中': return '<i data-lucide="clock" class="w-3.5 h-3.5 mr-1 text-amber-500"></i>'; case '缺欄位': return '<i data-lucide="alert-octagon" class="w-3.5 h-3.5 mr-1 text-rose-500"></i>'; default: return ''; }
        }

        function getStatusColorClass(status) {
            switch (status) { case '已上線': return 'bg-white text-emerald-600 border-emerald-200'; case '處理中': return 'bg-white text-amber-600 border-amber-200'; case '缺欄位': return 'bg-white text-rose-600 border-rose-200'; default: return 'bg-white text-slate-600 border-slate-200'; }
        }

        function renderKPI() {
            const filteredData = getProcessedData();
            const totalBenefit = filteredData.reduce((s, i) => s + (Number(i.benefit) || 0), 0).toFixed(3);
            const kpis = [
                { title: "總需求數量", value: appData.length, icon: "database", bgClass: "bg-blue-50", textClass: "text-blue-600", borderClass: "border-blue-100" },
                { title: "已上線完成", value: appData.filter(d => d.status === '已上線').length, icon: "check-circle", bgClass: "bg-emerald-50", textClass: "text-emerald-600", borderClass: "border-emerald-100" },
                { title: "處理中專案", value: appData.filter(d => d.status === '處理中').length, icon: "clock", bgClass: "bg-amber-50", textClass: "text-amber-600", borderClass: "border-amber-100" },
                { title: "缺欄位專案", value: appData.filter(d => d.status === '缺欄位').length, icon: "alert-octagon", bgClass: "bg-rose-50", textClass: "text-rose-600", borderClass: "border-rose-100" },
                { title: "預估總效益", value: totalBenefit, icon: "trending-up", bgClass: "bg-purple-50", textClass: "text-purple-600", borderClass: "border-purple-100" },
            ];

            const kpiCardsHtml = kpis.map((k) => {
                const isLongValue = String(k.value).length > 8;
                return `
                <div class="flex-1 min-w-[200px] flex items-center justify-between px-5 py-4 bg-white rounded-2xl shadow-sm border border-slate-200/60 hover:shadow-md transition-all duration-300 group cursor-default">
                  <div class="flex flex-col gap-1 min-w-0 pr-2">
                    <p class="text-[11px] font-bold text-slate-400 tracking-wider whitespace-nowrap">${k.title}</p>
                    <h3 class="${isLongValue ? 'text-2xl' : 'text-[28px]'} font-black text-slate-800 tracking-tight leading-none mt-1 truncate" title="${k.value}">${k.value}</h3>
                  </div>
                  <div class="shrink-0 w-11 h-11 rounded-[12px] ${k.bgClass} ${k.textClass} border ${k.borderClass} flex items-center justify-center transition-transform group-hover:rotate-3 shadow-sm">
                    <i data-lucide="${k.icon}" class="w-5 h-5"></i>
                  </div>
                </div>
              `;
            }).join('');

            document.getElementById('kpi-container').innerHTML = kpiCardsHtml;
            lucide.createIcons();
        }

        function renderSortHeader(label, sortKey, className) {
            const isActive = state.sortConfig.key === sortKey;
            const isAsc = isActive && state.sortConfig.direction === 'asc';
            const isDesc = isActive && state.sortConfig.direction === 'desc';

            return `
            <th class="px-3 py-3.5 cursor-pointer select-none group border-b border-slate-100 bg-[#f8fafc] hover:bg-[#f1f5f9] transition-colors ${className}" onclick="setSort('${sortKey}')">
              <div class="flex items-center text-[12px] font-bold text-slate-500 uppercase tracking-widest ${className.includes('text-center') ? 'justify-center' : ''}">
                ${label}
                <div class="flex items-center -space-x-[2px] ml-1 transition-opacity">
                    <i data-lucide="arrow-up" class="w-[11px] h-[11px] ${isAsc ? 'text-blue-500 opacity-100' : 'text-blue-300 opacity-40 group-hover:opacity-100'} transition-all"></i>
                    <i data-lucide="arrow-down" class="w-[11px] h-[11px] ${isDesc ? 'text-blue-500 opacity-100' : 'text-blue-300 opacity-40 group-hover:opacity-100'} transition-all"></i>
                </div>
              </div>
            </th>
          `;
        }

        function renderContent() {
            const filtered = getProcessedData();
            let currentData;
            if (state.itemsPerPage === 'All') {
                currentData = filtered;
            } else {
                const startIdx = (state.currentPage - 1) * state.itemsPerPage;
                currentData = filtered.slice(startIdx, startIdx + state.itemsPerPage);
            }

            const contentContainer = document.getElementById('content-container');

            if (state.view === 'table') {
                let stationHeaders = stationColumns.map(col => `<th class="px-2 py-3.5 text-center border-b border-slate-100 bg-[#f8fafc] text-[12px] font-bold text-slate-500 uppercase tracking-widest min-w-[60px] max-w-[100px] border-l border-slate-100/50">${col}</th>`).join('');

                let rowsHtml = currentData.map(row => {
                    let stationCells = stationColumns.map(col => {
                        const val = row[col.toLowerCase()];
                        if (!val) return `<td class="px-2 py-2 text-center border-l border-slate-100/50"><span class="text-slate-200 font-medium">-</span></td>`;
                        let mp = val, url = ''; if (val.includes('^')) { [mp, url] = val.split('^'); } else if (val.startsWith('http') || val.startsWith('Notes://')) { mp = 'Link'; url = val; }
                        return `<td class="px-2 py-2 text-center min-w-[60px] max-w-[100px] whitespace-normal break-words border-l border-slate-100/50">
                            <span class="font-bold text-[11px] text-slate-600 break-all">${mp}</span>
                            ${url ? `<a href="${url}" target="_blank" class="inline-block ml-1 opacity-60 hover:opacity-100 transition-all" onclick="event.stopPropagation()"><i data-lucide="external-link" class="w-3 h-3 text-blue-500"></i></a>` : ''}
                        </td>`;
                    }).join('');

                    let sqlBtn = row.dataSource ? `
                        <button onclick="viewSqlModal(${row.regId})" class="text-blue-500 hover:text-blue-700 transition-colors" title="檢視語法">
                            <i data-lucide="code" class="w-4 h-4 mx-auto"></i>
                        </button>` : `<span class="text-slate-200">-</span>`;

                    let tcdIcon = row.tcd ? `<i data-lucide="file-text" class="w-4 h-4 text-blue-500 hover:text-blue-700 mx-auto cursor-pointer transition-colors" title="開啟連結" onclick="window.open('${row.tcd.startsWith('http')?row.tcd:'#'}')"></i>` : `<span class="text-slate-200">-</span>`;

                    return `
                <tr class="table-row-hover transition-colors border-b border-slate-50 bg-white group cursor-default">
                  <td class="px-4 py-3 sticky left-0 z-10 bg-white group-hover:bg-[#f8fafc] text-slate-500 text-[12px] font-medium w-[90px] min-w-[90px] transition-colors border-r border-slate-100/50">${row.date}</td>
                  <td class="px-4 py-3 text-center sticky left-[90px] z-10 bg-white group-hover:bg-[#f8fafc] font-medium text-blue-500 text-[12px] w-[60px] min-w-[60px] transition-colors border-r border-slate-100/50">#${row.regId}</td>
                  <td class="px-4 py-3 text-center sticky left-[150px] z-10 bg-white group-hover:bg-[#f8fafc] font-bold text-emerald-500 text-[12px] w-[60px] min-w-[60px] sticky-left-shadow transition-colors border-r border-slate-100/50">${row.itemNum}</td>
                  <td class="px-4 py-3 w-[110px] min-w-[110px]">
                      ${getStatusTag(row.status)}
                  </td>
                  <td class="px-4 py-3 min-w-[60px] max-w-[100px] whitespace-normal break-words"><span class="text-[12px] font-semibold text-slate-600">${row.dept}</span></td>
                  <td class="px-4 py-3 min-w-[60px] max-w-[100px] whitespace-normal break-words"><span class="text-[12px] font-medium text-slate-500">${row.sec || '-'}</span></td>
                  <td class="px-4 py-3 font-medium text-slate-700 text-[12px] min-w-[70px] max-w-[120px] whitespace-normal break-words">${row.applicant}</td>
                  <td class="px-4 py-3 min-w-[300px] max-w-[450px] whitespace-normal break-words leading-relaxed text-slate-600 text-[12px] font-medium">${row.desc}</td>
                  <td class="px-4 py-3 text-slate-600 text-[12px] font-medium min-w-[80px] max-w-[120px] whitespace-normal break-words">${row.owner || '-'}</td>
                  <td class="px-4 py-3 text-center min-w-[60px]">${tcdIcon}</td>
                  <td class="px-4 py-3 font-semibold text-right text-[12px] min-w-[70px] ${row.benefit > 0 ? 'text-emerald-500' : 'text-slate-300'}">${row.benefit > 0 ? row.benefit : '-'}</td>
                  <td class="px-4 py-3 text-[12px] font-medium text-slate-500 min-w-[70px] max-w-[120px] text-center">${row.dbCat || '-'}</td>
                  <td class="px-4 py-3 text-center min-w-[60px]">${sqlBtn}</td>
                  ${stationCells}

                  <td class="px-3 py-3 sticky right-0 z-10 bg-white group-hover:bg-[#f8fafc] text-center sticky-right-shadow transition-colors">
                    <div class="flex items-center justify-center gap-3 opacity-60 group-hover:opacity-100 transition-opacity">
                      <button onclick="openModal('edit', ${row.regId})" class="text-blue-500 hover:text-blue-700 transition-colors" title="編輯">
                        <i data-lucide="pen-line" class="w-4 h-4"></i>
                      </button>
                      <button onclick="deleteData(${row.regId})" class="text-rose-400 hover:text-rose-600 transition-colors" title="刪除">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                      </button>
                    </div>

                }).join('');

                if (currentData.length === 0) {
                    rowsHtml = `<tr><td colspan="${15 + stationColumns.length}" class="px-4 py-16 text-center text-slate-500 font-bold uppercase tracking-widest opacity-40">找不到符合條件的資料。</td></tr>`;

              <div class="w-full overflow-x-auto bg-white">
                <table class="w-full text-left whitespace-nowrap min-w-max border-collapse">
                  <thead>
                    <tr>
                      ${renderSortHeader('Date', 'date', 'sticky left-0 z-30 border-r border-slate-100/50')}
                      ${renderSortHeader('ID', 'regId', 'text-center sticky left-[100px] z-30 border-r border-slate-100/50')}
                      ${renderSortHeader('No.', 'itemNum', 'text-center sticky left-[160px] z-30 border-r border-slate-100/50 sticky-left-shadow')}
                      ${renderSortHeader('Status', 'status', '')}
                      ${renderSortHeader('Dept', 'dept', 'min-w-[60px] max-w-[100px]')}
                      ${renderSortHeader('Sec', 'sec', 'min-w-[60px] max-w-[100px]')}
                      ${renderSortHeader('Applicant', 'applicant', 'min-w-[70px] max-w-[120px]')}
                      ${renderSortHeader('Description', 'desc', 'min-w-[300px] max-w-[450px]')}
                      ${renderSortHeader('Owner', 'owner', 'min-w-[80px] max-w-[120px]')}
                      <th class="px-4 py-4 border-b border-slate-100 bg-[#f8fafc] text-center text-[12px] font-bold text-slate-500 uppercase tracking-widest min-w-[60px]">TCD</th>
                      ${renderSortHeader('MP', 'benefit', 'text-right min-w-[70px]')}
                      <th class="px-4 py-4 border-b border-slate-100 bg-[#f8fafc] text-center text-[12px] font-bold text-slate-500 uppercase tracking-widest min-w-[70px] max-w-[120px]">DB</th>
                      <th class="px-4 py-4 border-b border-slate-100 bg-[#f8fafc] text-center text-[12px] font-bold text-slate-500 uppercase tracking-widest min-w-[60px]">SQL</th>
                      ${stationHeaders}
                      <th class="px-3 py-4 sticky right-0 z-30 border-b border-slate-100 bg-[#f8fafc] text-center text-[12px] font-bold text-slate-500 uppercase tracking-widest sticky-right-shadow">操作</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y-0">${rowsHtml}</tbody>
                </table>
              </div>
            `;
            } else {
                // 卡片視圖
                let cardsHtml = currentData.map(row => `
              <div class="flex flex-col p-5 rounded-2xl border transition-all hover:shadow-lg bg-white border-slate-200 hover:border-blue-300 relative group">
                <div class="absolute top-4 right-4 flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                  <button onclick="openModal('edit', ${row.regId})" class="text-blue-400 hover:text-blue-600"><i data-lucide="pen-line" class="w-4 h-4"></i></button>
                  <button onclick="deleteData(${row.regId})" class="text-rose-400 hover:text-rose-600"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
                <div class="flex justify-between items-start mb-4">
                  ${getStatusTag(row.status)}
                </div>
                <div class="flex justify-between items-end mb-2">
                  <div class="text-xs font-bold text-blue-500">#${row.regId}</div>
                  <div class="text-[11px] font-medium text-slate-400">${row.date}</div>
                </div>
                <h3 class="font-bold mb-4 flex-grow line-clamp-2 leading-relaxed text-[14px] text-slate-800" title="${row.desc}">${row.desc}</h3>
                <div class="mt-auto pt-4 border-t border-slate-50 flex justify-between items-center">
                  <span class="text-xs font-semibold text-slate-500">${row.applicant}</span>
                  <span class="text-xs font-black text-emerald-600">${row.benefit > 0 ? row.benefit + ' MP' : ''}</span>
                </div>
              </div>
            `).join('');

                if (currentData.length === 0) cardsHtml = `<div class="col-span-full py-16 text-center text-slate-500">找不到符合條件的資料。</div>`;
                contentContainer.innerHTML = `<div class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">${cardsHtml}</div>`;
            }
            lucide.createIcons();
        }

        function renderPagination() {
            const filtered = getProcessedData();
            const totalItems = filtered.length;
            const isAll = state.itemsPerPage === 'All';
            const totalPages = isAll ? 1 : (Math.ceil(totalItems / state.itemsPerPage) || 1);
            const startNum = totalItems > 0 ? (isAll ? 1 : (state.currentPage - 1) * state.itemsPerPage + 1) : 0;
            const endNum = isAll ? totalItems : Math.min(state.currentPage * state.itemsPerPage, totalItems);
            const prevDisabled = state.currentPage === 1 || isAll || totalItems === 0;
            const nextDisabled = state.currentPage === totalPages || isAll || totalItems === 0;

            document.getElementById('pagination-container').innerHTML = `
            <div class="flex items-center justify-between px-6 py-4">
              <div class="text-[12px] text-slate-500 font-medium">
                顯示 <span class="font-bold text-slate-800">${startNum}</span> - <span class="font-bold text-slate-800">${endNum}</span> 筆，共 <span class="font-bold text-slate-800">${totalItems}</span> 筆
              </div>
              <div class="flex items-center gap-5">
                 <div class="flex items-center gap-2">
                   <span class="text-[11px] font-bold text-slate-400 uppercase tracking-widest">每頁:</span>
                   <select onchange="changeItemsPerPage(this.value)" class="text-xs font-bold px-3 py-1.5 rounded-lg border border-slate-200 bg-white text-slate-700 cursor-pointer hover:border-slate-300 shadow-sm transition-all outline-none">
                      <option value="15" ${state.itemsPerPage === 15 ? 'selected' : ''}>15</option>
                      <option value="30" ${state.itemsPerPage === 30 ? 'selected' : ''}>30</option>
                      <option value="50" ${state.itemsPerPage === 50 ? 'selected' : ''}>50</option>
                      <option value="All" ${state.itemsPerPage === 'All' ? 'selected' : ''}>All</option>
                    </select>
                 </div>
                 <div class="flex items-center gap-1.5">
                   <button onclick="changePage(${Math.max(1, state.currentPage - 1)})" ${prevDisabled ? 'disabled' : ''} class="p-2 rounded-lg border transition-colors ${prevDisabled ? 'border-slate-100 text-slate-300 cursor-not-allowed' : 'border-slate-200 text-slate-500 hover:bg-slate-100 hover:text-slate-800'}">
                     <i data-lucide="chevron-left" class="w-4 h-4"></i>
                   </button>
                   <span class="text-[12px] px-3 text-slate-700 font-bold tracking-widest">${state.currentPage} / ${totalPages}</span>
                   <button onclick="changePage(${Math.min(totalPages, state.currentPage + 1)})" ${nextDisabled ? 'disabled' : ''} class="p-2 rounded-lg border transition-colors ${nextDisabled ? 'border-slate-100 text-slate-300 cursor-not-allowed' : 'border-slate-200 text-slate-500 hover:bg-slate-100 hover:text-slate-800'}">
                     <i data-lucide="chevron-right" class="w-4 h-4"></i>
                   </button>
                 </div>
              </div>
            </div>
          `;
          lucide.createIcons();
        }

        function setView(viewMode) {
            state.view = viewMode;
            const btnTable = document.getElementById('btn-view-table');
            const btnCard = document.getElementById('btn-view-card');
            if (viewMode === 'table') {
                btnTable.className = "flex items-center gap-1.5 px-3 py-1 text-xs font-bold rounded-[6px] transition-all bg-white text-blue-600 shadow-sm border border-slate-200";
                btnCard.className = "flex items-center gap-1.5 px-3 py-1 text-xs font-bold rounded-[6px] transition-all text-slate-500 hover:text-slate-800";
            } else {
                btnCard.className = "flex items-center gap-1.5 px-3 py-1 text-xs font-bold rounded-[6px] transition-all bg-white text-blue-600 shadow-sm border border-slate-200";
                btnTable.className = "flex items-center gap-1.5 px-3 py-1 text-xs font-bold rounded-[6px] transition-all text-slate-500 hover:text-slate-800";
            }
            renderContent();
        }

        function setSort(key) {
            state.sortConfig.direction = (state.sortConfig.key === key && state.sortConfig.direction === 'desc') ? 'asc' : 'desc';
            state.sortConfig.key = key;
            renderContent();
        }

        function handleSearch(val) { state.searchTerm = val; state.currentPage = 1; renderContent(); renderPagination(); }
        function handleStatusFilter(val) { state.statusFilter = val; state.currentPage = 1; renderContent(); renderPagination(); }
        function changePage(page) { state.currentPage = page; renderContent(); renderPagination(); }

        function changeItemsPerPage(num) {
            state.itemsPerPage = (num === 'All') ? 'All' : Number(num);
            state.currentPage = 1;
            renderContent();
            renderPagination();
        }

        function openModal(mode, regId = null) {
            const modal = document.getElementById('crud-modal');
            const content = document.getElementById('crud-modal-content');
            document.getElementById('modal-mode').value = mode;
            document.getElementById('crud-form').reset();
            const baseInputs = ['form-dept', 'form-sec', 'form-applicant', 'form-desc'];

            if (mode === 'add') {
                document.getElementById('modal-title').innerHTML = '<i data-lucide="plus-circle" class="w-5 h-5 text-blue-600"></i> 新增需求';
                document.getElementById('edit-advanced-section').classList.add('hidden');
                baseInputs.forEach(id => document.getElementById(id).disabled = false);
            } else if (mode === 'edit') {
                document.getElementById('modal-title').innerHTML = `<i data-lucide="edit-3" class="w-5 h-5 text-blue-600"></i> 編輯需求 <span class="ml-2 text-sm font-normal text-slate-500">#RegID: ${regId}</span>`;
                document.getElementById('edit-advanced-section').classList.remove('hidden');
                document.getElementById('modal-regid').value = regId;
                baseInputs.forEach(id => document.getElementById(id).disabled = true);

                const item = appData.find(d => d.regId === regId);
                if (item) {
                    document.getElementById('form-dept').value = item.dept; document.getElementById('form-sec').value = item.sec || '';
                    document.getElementById('form-applicant').value = item.applicant; document.getElementById('form-desc').value = item.desc;
                    document.getElementById('form-status').value = item.status; document.getElementById('form-owner').value = item.owner || '';
                    document.getElementById('form-benefit').value = item.benefit || ''; document.getElementById('form-dbcat').value = item.dbCat || '';
                    document.getElementById('form-tcd').value = item.tcd || ''; document.getElementById('form-applink').value = item.appLink || '';
                    document.getElementById('form-datasource').value = item.dataSource || '';

                    document.getElementById('form-stations-grid').innerHTML = stationColumns.map(col => {
                        let val = item[col.toLowerCase()] || '', mp = '', url = '';
                        if (val.includes('^')) { [mp, url] = val.split('^'); } else if (val.startsWith('http') || val.startsWith('Notes://')) { url = val; } else { mp = val; }
                        return `<div class="p-2.5 border rounded-lg bg-slate-50 relative focus-within:border-blue-400 focus-within:bg-white transition-all"><label class="absolute -top-2 left-2 px-1 text-[10px] font-bold bg-slate-50 text-slate-400 uppercase tracking-widest">${col}</label><div class="space-y-1.5 mt-1"><div class="flex items-center bg-white border border-slate-200 rounded overflow-hidden shadow-sm"><span class="pl-2 text-slate-300"><i data-lucide="activity" class="w-3 h-3"></i></span><input type="text" id="st-mp-${col}" value="${mp}" placeholder="MP Saving" class="w-full text-xs font-medium px-2 py-1 bg-transparent outline-none"></div><div class="flex items-center bg-white border border-slate-200 rounded overflow-hidden shadow-sm"><span class="pl-2 text-slate-300"><i data-lucide="link" class="w-3 h-3"></i></span><input type="text" id="st-url-${col}" value="${url}" placeholder="URL" class="w-full text-xs font-medium px-2 py-1 bg-transparent outline-none"></div></div></div>`;
                    }).join('');
                }
            }
            modal.classList.remove('hidden'); lucide.createIcons();
            setTimeout(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); }, 10);
        }

        function viewSqlModal(regId) {
            const item = appData.find(d => d.regId === regId);
            if (!item || !item.dataSource) return;
            document.getElementById('sql-viewer-code').textContent = item.dataSource;
            const modal = document.getElementById('sql-modal');
            const content = document.getElementById('sql-modal-content');
            modal.classList.remove('hidden');
            lucide.createIcons();
            setTimeout(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); }, 10);
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(modalId + '-content');
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => modal.classList.add('hidden'), 200);
        }

        document.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            fetchTasks();
        });
    </script>
</body>
</html>
